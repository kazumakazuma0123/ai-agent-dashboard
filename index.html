<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Virtual Office</title>
<style>
:root {
  --wall:      #d6c9b4;
  --floor:     #c09060;
  --desk-top:  #b08030;
  --desk-side: #7a5010;
  --chair:     #3a3a58;
  --sofa-back: #7055a8;
  --sofa-seat: #8a6abe;
  --plant-g:   #2d6a3f;
  --panel-bg:  #0c0c22;
  --border:    #1e1e4a;
  --text:      #dde0ff;
  --dim:       #6668a0;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #08081a;
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px 40px;
}

header { text-align:center; margin-bottom:20px; }
header h1 {
  font-size:1.5rem; font-weight:700;
  background:linear-gradient(135deg,#38bdf8,#818cf8,#4ade80);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  margin-bottom:4px;
}
header p { color:var(--dim); font-size:.8rem; }
#clock   { color:#2e2e58; font-size:.72rem; margin-top:3px; font-variant-numeric:tabular-nums; }

/* ── scene ── */
.scene-wrap {
  width:100%; max-width:900px;
  border-radius:14px; overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.7);
  border:1px solid #1a1a3a;
}
.office {
  position:relative;
  width:100%;
  padding-top:57.8%;
  background:var(--floor);
  background-image:
    repeating-linear-gradient(90deg,transparent,transparent 58px,rgba(0,0,0,.04) 58px,rgba(0,0,0,.04) 60px),
    repeating-linear-gradient(0deg, transparent,transparent 58px,rgba(0,0,0,.03) 58px,rgba(0,0,0,.03) 60px);
}
.office > * { position:absolute; }

/* wall */
.wall {
  top:0; left:0; right:0; height:42%;
  background:linear-gradient(180deg,#d8c8b0,#c4b098);
  z-index:1;
}
.wall-edge {
  top:42%; left:0; right:0; height:2.2%;
  background:#8a6030; z-index:3;
  box-shadow:0 4px 14px rgba(0,0,0,.35);
}

/* windows */
.window {
  top:6%; height:78%; width:13%;
  background:linear-gradient(180deg,#b8d8f0,#daeeff);
  border:5px solid #8a6020; border-radius:3px; z-index:2;
}
.window::before,.window::after{content:'';position:absolute;background:#8a6020;}
.window::before{top:0;bottom:0;left:calc(50% - 2.5px);width:5px;}
.window::after {left:0;right:0;top:calc(50% - 2.5px);height:5px;}
.window-l{left:3.5%;}
.window-r{right:3.5%;}

/* command station label */
.cmd-label {
  top:1%; left:50%; transform:translateX(-50%);
  font-size:.46rem; letter-spacing:.14em; text-transform:uppercase; color:#9a8868;
  z-index:5; white-space:nowrap;
}

/* command center */
.cmd-station {
  top:2%; left:50%; transform:translateX(-50%);
  width:26%; z-index:4;
  display:flex; flex-direction:column; align-items:center;
}
.cmd-screens { display:flex; gap:5px; margin-bottom:3px; }
.cmd-screen {
  width:52px; height:36px;
  background:#081828; border:2px solid #2a4a6a; border-radius:3px;
  padding:4px 3px 3px; display:flex; flex-direction:column; gap:2px; overflow:hidden;
}
.sl { height:2px; border-radius:1px; opacity:.75; }
.cmd-desk {
  width:100%; height:20px;
  background:linear-gradient(180deg,#b08030,#8a6010);
  border-radius:4px 4px 0 0;
  box-shadow:0 4px 10px rgba(0,0,0,.35);
}

/* workstations */
.ws { top:45%; z-index:4; display:flex; flex-direction:column; align-items:center; }
.ws-1{left:6%; width:17%;}
.ws-2{left:28%;width:17%;}
.ws-3{left:50%;width:17%;}

.desk-item{ display:flex; flex-direction:column; align-items:center; width:100%; }
.desk-monitor{
  width:36px; height:24px;
  background:#081828; border:2px solid #2a4060; border-radius:2px;
  margin-bottom:3px; position:relative; overflow:hidden;
}
.desk-monitor-stand{ width:5px; height:5px; background:#5a6a7a; margin:0 auto; }
.desk-surface{
  width:100%; height:16px;
  background:linear-gradient(180deg,#b28030,#8a5f10);
  border-radius:3px 3px 0 0;
  box-shadow:0 4px 8px rgba(0,0,0,.3); position:relative;
}
.desk-front{ width:100%; height:8px; background:#6b4010; border-radius:0 0 2px 2px; }
.desk-chair{
  width:42%; height:11px; background:var(--chair);
  border-radius:3px; margin-top:3px;
  box-shadow:0 3px 6px rgba(0,0,0,.3);
}

/* break area */
.break-area{
  top:46%; right:4%; width:22%; z-index:4;
  display:flex; flex-direction:column; align-items:center;
}
.break-label{ font-size:.46rem; letter-spacing:.12em; text-transform:uppercase; color:#9a8868; margin-bottom:5px; }
.sofa-back {
  width:90%; height:20px;
  background:linear-gradient(180deg,#7a5aaa,#6248a0);
  border-radius:8px 8px 2px 2px;
}
.sofa-seat {
  width:90%; height:17px; background:#8a6abe;
  border-radius:0 0 6px 6px;
  display:flex; gap:3px; padding:2px 8px 0;
  box-shadow:0 5px 12px rgba(0,0,0,.3);
}
.sofa-cushion{ flex:1; height:9px; background:#9a7ace; border-radius:2px 2px 0 0; }
.coffee-table{
  width:48%; height:6px; background:#8a6010;
  border-radius:2px; margin-top:14px;
  box-shadow:0 2px 5px rgba(0,0,0,.25);
}

/* plants */
.plant{ z-index:5; display:flex; flex-direction:column; align-items:center; }
.plant-leaves{
  width:28px; height:22px;
  background:radial-gradient(ellipse,#3a8a50 30%,#226038 100%);
  border-radius:50% 50% 30% 30%;
}
.plant-pot{ width:18px; height:14px; background:#8b4513; border-radius:1px 1px 4px 4px; }

/* characters */
.char{
  z-index:10; cursor:pointer;
  transition:transform .2s, filter .2s;
}
.char:hover{
  transform:scale(1.1) translateY(-4px) !important;
  filter:drop-shadow(0 8px 16px rgba(0,0,0,.5));
}
.char svg{ filter:drop-shadow(0 4px 8px rgba(0,0,0,.4)); }

.sbubble{
  position:absolute; top:-6px; right:-2px;
  width:13px; height:13px; border-radius:50%;
  border:2px solid #08081a; z-index:11;
}
.sbubble.active { background:#4ade80; animation:pdot 2s infinite; }
.sbubble.busy   { background:#facc15; animation:pdot 1.4s infinite; }
.sbubble.idle   { background:#94a3b8; }

@keyframes pdot{0%,100%{opacity:1;}50%{opacity:.55;}}

.char-label{
  position:absolute; bottom:-18px; left:50%; transform:translateX(-50%);
  font-size:.58rem; color:var(--dim); white-space:nowrap;
  background:rgba(8,8,26,.85); padding:1px 6px; border-radius:4px;
}

/* panel */
.overlay{
  position:fixed; inset:0; background:rgba(0,0,0,.45);
  z-index:100; opacity:0; pointer-events:none; transition:opacity .3s;
}
.overlay.open{opacity:1;pointer-events:all;}

.panel{
  position:fixed; top:0; right:0;
  width:310px; height:100vh;
  background:var(--panel-bg); border-left:1px solid var(--border);
  z-index:101; transform:translateX(100%);
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  overflow-y:auto; padding:28px 22px;
}
.panel.open{transform:translateX(0);}

.panel-close{
  position:absolute; top:14px; right:14px;
  background:none; border:1px solid var(--border);
  color:var(--text); width:30px; height:30px;
  border-radius:7px; cursor:pointer; font-size:.95rem;
  display:flex; align-items:center; justify-content:center;
  transition:background .2s;
}
.panel-close:hover{background:rgba(255,255,255,.07);}
.panel-name { font-size:1.15rem; font-weight:700; text-align:center; margin-bottom:3px; }
.panel-role { font-size:.7rem; color:var(--dim); text-align:center; margin-bottom:14px; }
.panel-status-row{
  display:flex; align-items:center; gap:8px; justify-content:center;
  padding:7px 14px; background:rgba(255,255,255,.03);
  border-radius:8px; margin-bottom:20px; border:1px solid rgba(255,255,255,.06);
}
.psdot{width:7px;height:7px;border-radius:50%;}
.panel-section{ font-size:.62rem; text-transform:uppercase; letter-spacing:.1em; color:var(--dim); margin:16px 0 6px; }
.panel-task{
  font-size:.8rem; background:rgba(255,255,255,.03);
  border:1px solid var(--border); border-radius:8px; padding:10px 12px;
}
.log-row{ display:flex; gap:10px; padding:4px 0; font-size:.73rem; color:var(--dim); border-bottom:1px solid rgba(255,255,255,.04); }
.log-row:last-child{border-bottom:none;}
.log-t{ color:#252550; min-width:38px; font-variant-numeric:tabular-nums; }

/* animations */
@keyframes blink{0%,87%,100%{transform:scaleY(1);}91%{transform:scaleY(.08);}}
@keyframes tap-l{0%,100%{transform:rotate(-6deg) translateY(0);}50%{transform:rotate(-6deg) translateY(5px);}}
@keyframes tap-r{0%,100%{transform:rotate(6deg) translateY(5px);}50%{transform:rotate(6deg) translateY(0);}}
@keyframes head-tilt{0%,100%{transform:rotate(0);}30%{transform:rotate(-4deg);}70%{transform:rotate(3deg);}}
@keyframes look-lr{0%,15%,100%{transform:translateX(0);}40%,55%{transform:translateX(-4px);}75%{transform:translateX(4px);}}
@keyframes scan{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);}}
@keyframes glass-sweep{0%,100%{transform:rotate(0);}50%{transform:rotate(20deg);}}
@keyframes pencil-tap{0%,55%,100%{transform:rotate(-20deg) translateY(0);}72%{transform:rotate(-20deg) translateY(4px);}}
@keyframes cursor-blink{0%,49%{opacity:1;}50%,100%{opacity:0;}}
@keyframes scr-glow{0%,100%{opacity:.55;}50%{opacity:1;}}
@keyframes float-idle{0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}}
</style>
</head>
<body>

<header>
  <h1>AI Virtual Office</h1>
  <p>Claude Code マルチエージェント管理システム — キャラをタップして状況確認</p>
  <p id="clock"></p>
</header>

<div class="scene-wrap">
<div class="office">

  <!-- wall + windows -->
  <div class="wall"></div>
  <div class="wall-edge"></div>
  <div class="window window-l"></div>
  <div class="window window-r"></div>

  <!-- monitor station label -->
  <div class="cmd-label">MONITOR STATION</div>

  <!-- command center -->
  <div class="cmd-station">
    <div class="cmd-screens">
      <div class="cmd-screen">
        <div class="sl" style="background:#38bdf8;width:85%;animation:scr-glow 1.8s infinite;"></div>

  <!-- workstation 1: coder -->
  <div class="ws ws-1">

      <div class="desk-monitor" style="animation:scr-glow 2s infinite;">
        <div style="padding:3px;display:flex;flex-direction:column;gap:1.5px;position:relative;">

<script>
const agents = {

    location:'指揮台',
    task:'3エージェントの進捗を統括・監視中',

      {t:'14:05',tx:'全エージェント起動確認'},

  },
  coder: {
    emoji:'🔵', name:'コーダー', role:'Coder Agent',
    color:'#38bdf8', statusColor:'#facc15', statusText:'コーディング中',
    location:'デスク 1',
    task:'sui-room-crean の清掃スケジュール機能を実装中',
    logs:[

      {t:'14:28',tx:'API ルート /api/rooms を追加'},
      {t:'14:15',tx:'Supabase スキーマを更新'},
      {t:'14:08',tx:'TypeScript 型定義を追加'},
    ]
  },
  reviewer: {
    emoji:'🩷', name:'レビュアー', role:'Reviewer Agent',
    color:'#f472b6', statusColor:'#facc15', statusText:'レビュー中',
    location:'デスク 2',
    task:'PR #24 のコードレビュー（3件の指摘あり）',
    logs:[
      {t:'14:30',tx:'型エラーを2件検出'},
      {t:'14:22',tx:'セキュリティチェック完了'},
      {t:'14:10',tx:'コードスタイル確認'},
      {t:'14:02',tx:'PR #24 レビュー開始'},
    ]
  },
  researcher: {
    emoji:'🟡', name:'リサーチャー', role:'Research Agent',
    color:'#facc15', statusColor:'#4ade80', statusText:'情報収集中',
    location:'デスク 3',
    task:'Next.js 16 の新機能と互換性を調査中',
    logs:[
      {t:'14:35',tx:'公式ドキュメントを参照'},
      {t:'14:29',tx:'GitHub Issues 24件を確認'},
      {t:'14:20',tx:'npm パッケージ互換性チェック'},
      {t:'14:11',tx:'調査タスク受信'},
    ]
  }
};

function showPanel(id) {
  const a = agents[id];
  document.getElementById('panel-body').innerHTML = `
    <div style="margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid #1e1e4a;">
      <div style="font-size:2.4rem;text-align:center;margin-bottom:8px;">${a.emoji}</div>
      <div class="panel-name">${a.name}</div>
      <div class="panel-role">${a.role}</div>
      <div class="panel-status-row">
        <div class="psdot" style="background:${a.statusColor};"></div>
        <span style="font-size:.82rem;color:${a.color};font-weight:600;">${a.statusText}</span>
        <span style="font-size:.7rem;color:#3a3a68;margin-left:4px;">@ ${a.location}</span>
      </div>
    </div>
    <div class="panel-section">現在のタスク</div>
    <div class="panel-task">${a.task}</div>
    <div class="panel-section">アクティビティログ</div>
    <div>
      ${a.logs.map(l=>`
        <div class="log-row">
          <span class="log-t">${l.t}</span>
          <span>${l.tx}</span>
        </div>
      `).join('')}
    </div>
  `;
  document.getElementById('panel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

function tick() {
  const d=new Date(), p=n=>String(n).padStart(2,'0');
  document.getElementById('clock').textContent=
    `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())}  ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
setInterval(tick,1000); tick();
</script>
