<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent Monitor</title>
<style>
:root {
  --bg:       #08081a;
  --card:     #0e0e28;
  --border:   #1e1e4a;
  --text:     #dde0ff;
  --dim:      #6668a0;
  --c-blue:   #38bdf8;
  --c-pink:   #f472b6;
  --c-yellow: #facc15;
  --c-green:  #4ade80;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  padding: 24px 20px 48px;
}

/* ── header ── */
.header {
  max-width: 960px; margin: 0 auto 28px;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
}
.header-left h1 {
  font-size: 1.4rem; font-weight: 700;
  background: linear-gradient(135deg,#38bdf8,#818cf8,#4ade80);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.header-left p { color:var(--dim); font-size:.78rem; margin-top:3px; }

.header-right { display:flex; align-items:center; gap:12px; }
#update-info { font-size:.72rem; color:var(--dim); font-variant-numeric:tabular-nums; }

.refresh-btn {
  background:none; border:1px solid var(--border); color:var(--dim);
  padding:5px 12px; border-radius:6px; cursor:pointer; font-size:.75rem;
  transition:border-color .2s, color .2s;
}
.refresh-btn:hover { border-color:#38bdf8; color:#38bdf8; }

/* refresh spinner */
.spinner {
  width:14px; height:14px; border-radius:50%;
  border:2px solid var(--border); border-top-color:#38bdf8;
  animation:spin .8s linear infinite; display:none;
}
.spinner.show { display:inline-block; }
@keyframes spin { to{transform:rotate(360deg);} }

/* ── config banner ── */
.config-banner {
  max-width:960px; margin:0 auto 20px;
  background:rgba(250,204,21,.06); border:1px solid rgba(250,204,21,.2);
  border-radius:10px; padding:12px 18px;
  font-size:.8rem; color:#ca8a04;
  display:none;
}
.config-banner.show { display:block; }
.config-banner strong { color:#facc15; }

/* ── grid ── */
.grid {
  max-width:960px; margin:0 auto;
  display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:18px;
}

/* ── empty state ── */
.empty {
  max-width:960px; margin:40px auto;
  text-align:center; padding:60px 20px;
  border:1px dashed var(--border); border-radius:16px;
  display:none;
}
.empty.show { display:block; }
.empty-emoji { font-size:3rem; margin-bottom:14px; }
.empty h2 { font-size:1.1rem; margin-bottom:8px; color:var(--dim); font-weight:500; }
.empty p  { font-size:.8rem; color:#3a3a68; line-height:1.7; }

/* ── agent card ── */
.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px; padding:18px;
  position:relative; overflow:hidden;
  transition:border-color .3s, box-shadow .3s, transform .2s;
  animation:card-in .35s ease;
}
@keyframes card-in {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}
.card:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(0,0,0,.4); }

.card::before {
  content:''; position:absolute; top:0;left:0;right:0; height:2px;
  background:var(--accent); border-radius:14px 14px 0 0;
}
.card:hover { border-color:var(--accent); }

/* top row */
.card-top { display:flex; align-items:flex-start; gap:14px; margin-bottom:14px; }
.avatar   { width:60px; height:76px; flex-shrink:0; }
.avatar svg { filter:drop-shadow(0 3px 6px rgba(0,0,0,.4)); width:100%;height:100%; }

.card-info { flex:1; min-width:0; }
.project-name {
  font-size:.95rem; font-weight:700;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-bottom:5px;
}
.status-row { display:flex; align-items:center; gap:7px; margin-bottom:6px; }
.sdot {
  width:7px; height:7px; border-radius:50%; flex-shrink:0;
}
.sdot.active  { background:#4ade80; animation:pdot 2s infinite; }
.sdot.idle    { background:#facc15; animation:pdot 2s infinite; }
.sdot.stopped { background:#94a3b8; }
@keyframes pdot { 0%,100%{opacity:1;}50%{opacity:.45;} }

.status-text { font-size:.75rem; }
.status-text.active  { color:#4ade80; }
.status-text.idle    { color:#facc15; }
.status-text.stopped { color:#94a3b8; }

.time-ago { font-size:.68rem; color:var(--dim); }

/* last action */
.last-action {
  background:rgba(255,255,255,.02);
  border:1px solid var(--border);
  border-radius:8px; padding:8px 11px;
  margin-bottom:11px;
}
.last-action-label { font-size:.62rem; text-transform:uppercase; letter-spacing:.08em; color:var(--dim); margin-bottom:3px; }
.last-action-text  { font-size:.78rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* stats */
.stats { display:flex; gap:16px; margin-bottom:12px; }
.stat  { display:flex; flex-direction:column; }
.stat-val   { font-size:.85rem; font-weight:700; }
.stat-label { font-size:.62rem; color:var(--dim); }

/* log */
.log-section-label { font-size:.62rem; text-transform:uppercase; letter-spacing:.08em; color:var(--dim); margin-bottom:6px; }
.log-row {
  display:flex; gap:9px; padding:3px 0;
  font-size:.7rem; color:var(--dim);
  border-bottom:1px solid rgba(255,255,255,.03);
}
.log-row:last-child { border-bottom:none; }
.log-t { color:#252550; min-width:42px; font-variant-numeric:tabular-nums; flex-shrink:0; }
.log-tool { color:#3a3a6a; min-width:46px; flex-shrink:0; }

/* ── character animations ── */
@keyframes blink { 0%,87%,100%{transform:scaleY(1);}91%{transform:scaleY(.08);} }
@keyframes tap-l { 0%,100%{transform:rotate(-6deg) translateY(0);}50%{transform:rotate(-6deg) translateY(5px);} }
@keyframes tap-r { 0%,100%{transform:rotate(6deg) translateY(5px);}50%{transform:rotate(6deg) translateY(0);} }
@keyframes look-lr { 0%,15%,100%{transform:translateX(0);}40%,55%{transform:translateX(-4px);}75%{transform:translateX(4px);} }
@keyframes scan  { 0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);} }
@keyframes head-tilt { 0%,100%{transform:rotate(0);}30%{transform:rotate(-4deg);}70%{transform:rotate(3deg);} }
@keyframes glass-sweep { 0%,100%{transform:rotate(0);}50%{transform:rotate(20deg);} }
@keyframes pencil-tap  { 0%,55%,100%{transform:rotate(-20deg) translateY(0);}72%{transform:rotate(-20deg) translateY(4px);} }
@keyframes cursor-blink{ 0%,49%{opacity:1;}50%,100%{opacity:0;} }
@keyframes float-idle  { 0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);} }
</style>
</head>
<body>

<!-- ── VPS URLの設定 ── -->

  </div>

const ACCENT_COLORS = { blue:'#38bdf8', pink:'#f472b6', yellow:'#facc15', green:'#4ade80' }
const AVATAR_TYPES  = ['blue','pink','yellow','green']

// セッションIDから一貫したアバタータイプを決定
function avatarType(sessionId) {
  let h = 0
  for (const c of sessionId) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff
  return AVATAR_TYPES[Math.abs(h) % 4]
}

// 経過時間を人間が読みやすい形式に
function timeAgo(isoStr) {
  const sec = Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000)
  if (sec < 60)   return `${sec}秒前`
  if (sec < 3600) return `${Math.floor(sec/60)}分前`
  return `${Math.floor(sec/3600)}時間前`
}

// 経過時間 (起動から)
function elapsed(isoStr) {
  const sec = Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000)
  const m = Math.floor(sec/60), h = Math.floor(m/60)
  if (h > 0) return `${h}h ${m%60}m`
  if (m > 0) return `${m}m ${sec%60}s`
  return `${sec}s`
}

function statusLabel(s) {
  return s === 'active' ? '稼働中' : s === 'idle' ? 'アイドル' : '停止'
}

// カードのHTML生成
function renderCard(agent) {
  const type   = avatarType(agent.session_id)
  const accent = ACCENT_COLORS[type]
  const logs   = (agent.history || []).slice(0, 4)

  return `
    <div class="card" style="--accent:${accent}">
      <div class="card-top">
        <div class="avatar">${AVATARS[type]}</div>
        <div class="card-info">
          <div class="project-name">${agent.project}</div>
          <div class="status-row">
            <div class="sdot ${agent.status}"></div>
            <span class="status-text ${agent.status}">${statusLabel(agent.status)}</span>
          </div>
          <div class="time-ago">最終活動: ${timeAgo(agent.last_seen)}</div>
        </div>
      </div>

      <div class="last-action">
        <div class="last-action-label">最後のアクション</div>
        <div class="last-action-text" style="color:${accent}">
          ${agent.last_desc || agent.last_tool || '—'}
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <span class="stat-val" style="color:${accent}">${agent.tool_count}</span>
          <span class="stat-label">ツール実行数</span>
        </div>
        <div class="stat">
          <span class="stat-val">${elapsed(agent.started_at)}</span>
          <span class="stat-label">経過時間</span>
        </div>
        <div class="stat">
          <span class="stat-val" style="font-size:.68rem;color:var(--dim);">${agent.session_id.slice(0,8)}</span>
          <span class="stat-label">セッションID</span>
        </div>
      </div>

      ${logs.length ? `
        <div class="log-section-label">最近のアクティビティ</div>
        <div>
          ${logs.map(l => `
            <div class="log-row">
              <span class="log-t">${new Date(l.time).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span>
              <span class="log-tool">${l.tool}</span>
              <span>${l.desc}</span>
            </div>
          `).join('')}
        </div>
      ` : ''}
    </div>
  `
}

// ── ポーリング ──
let lastFetch = null
let pollTimer = null

async function fetchAgents() {
  if (VPS_URL.includes('YOUR_VPS_IP')) {
    document.getElementById('config-banner').classList.add('show')
    document.getElementById('empty').classList.add('show')
    document.getElementById('update-info').textContent = '⚠ VPS_URL未設定'
    return
  }

  const spinner = document.getElementById('spinner')
  spinner.classList.add('show')

  try {
    const res  = await fetch(`${VPS_URL}/api/agents`)
    const data = await res.json()

    const grid  = document.getElementById('grid')
    const empty = document.getElementById('empty')

    if (data.length === 0) {
      grid.innerHTML = ''
      empty.classList.add('show')
    } else {
      empty.classList.remove('show')
      grid.innerHTML = data.map(renderCard).join('')
    }

    lastFetch = new Date()
    updateInfo()
  } catch (e) {
    document.getElementById('update-info').textContent = '⚠ VPSに接続できません'
  } finally {
    spinner.classList.remove('show')
  }
}

function updateInfo() {
  if (!lastFetch) return
  const sec = Math.floor((Date.now() - lastFetch) / 1000)
  document.getElementById('update-info').textContent =
    `最終更新: ${sec}秒前 | ${POLL_INTERVAL/1000}秒ごとに自動更新`
}

// 起動
fetchAgents()
pollTimer = setInterval(fetchAgents, POLL_INTERVAL)
setInterval(updateInfo, 1000)
</script>

</html>
