<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>エージェントオフィス — ドット絵モニター</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root {
  --wall: #e8dcc8;
  --floor-a: #c49a6c;
  --floor-b: #b8895c;
  --desk: #8b6847;
  --desk-dark: #7a5a3a;
  --monitor-body: #2a2a3a;
  --monitor-border: #3a4a5a;
  --chair: #4a4a5a;
  --plant-a: #3a8a3a;
  --plant-b: #2a6a2a;
  --sky: #87ceeb;
  --bg: #1a1a2e;
  --panel-bg: #1e1e32;
  --panel-border: #c49a6c;
  --text: #f0e6d0;
  --text-dim: #8a7e6a;
  --active-green: #4ade80;
  --idle-yellow: #facc15;
  --stopped-gray: #6b7280;
  --pixel: 4px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Press Start 2P', monospace;
  min-height: 100vh;
  overflow-x: hidden;
  image-rendering: pixelated;
  -ms-interpolation-mode: nearest-neighbor;
}

/* ── RPG Status Bar ── */
.status-bar {
  position: fixed; top:0; left:0; right:0; z-index:200;
  background: var(--panel-bg);
  border-bottom: 4px solid var(--panel-border);
  padding: 0 12px;
  height: 44px;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 8px;
  image-rendering: pixelated;
}
.sb-left { display:flex; align-items:center; gap:12px; }
.sb-title {
  font-size:9px; color:#facc15;
  text-shadow: 2px 2px 0 #7a5a3a;
  letter-spacing: 1px;
}
.sb-metric { display:flex; align-items:center; gap:6px; color:var(--text-dim); }
.sb-label { font-size:7px; }
.sb-val {
  color:var(--text); font-variant-numeric:tabular-nums;
  min-width:20px; text-align:right;
}
.sb-hp-bar {
  width:48px; height:8px; background:#333;
  border: 2px solid #555; position:relative;
}
.sb-hp-fill {
  height:100%; transition: width .5s;
}
.sb-right { display:flex; align-items:center; gap:10px; }
#update-info { color:var(--text-dim); font-size:7px; }
.refresh-btn {
  background: var(--panel-bg); border:2px solid var(--panel-border);
  color:var(--text); padding:4px 8px; cursor:pointer;
  font-family:'Press Start 2P', monospace; font-size:7px;
  transition:all .15s;
}
.refresh-btn:hover { background:var(--panel-border); color:#1a1a2e; }
.refresh-btn:active { transform:scale(.95); }
.spinner {
  width:10px; height:10px; border-radius:50%;
  border:2px solid #333; border-top-color:var(--idle-yellow);
  animation:spin .6s linear infinite; display:none;
}
.spinner.show { display:inline-block; }
@keyframes spin { to{transform:rotate(360deg);} }

/* ── Main Layout ── */
.main-wrap {
  margin-top: 44px;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: calc(100vh - 44px);
  background: radial-gradient(ellipse at 50% 30%, rgba(200,180,140,.08), transparent 70%), var(--bg);
  padding-bottom: 10px;
}

/* ── SVG Scene ── */
.scene-wrap {
  width: 100%;
  max-width: 960px;
  position: relative;
}
.scene-svg {
  width: 100%;
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}

/* ── Info Panel (RPG Dialogue Box) ── */
.info-panel {
  width: 100%;
  max-width: 940px;
  margin: 8px auto 0;
  background: var(--panel-bg);
  border: 4px solid var(--panel-border);
  border-radius: 0;
  padding: 10px 14px;
  position: relative;
}
.info-panel::before {
  content:'';
  position:absolute; top:4px; left:4px; right:4px; bottom:4px;
  border:2px solid rgba(196,154,108,.3);
  pointer-events:none;
}
.panel-title {
  font-size:8px; color:#facc15;
  text-shadow:1px 1px 0 #7a5a3a;
  margin-bottom:8px;
  letter-spacing:1px;
}
.agent-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap:8px;
}
.agent-card {
  background:rgba(255,255,255,.03);
  border:2px solid rgba(196,154,108,.25);
  padding:8px 10px;
  display:flex; align-items:flex-start; gap:10px;
  font-size:7px; line-height:1.6;
}
.agent-card .status-dot {
  width:8px; height:8px; flex-shrink:0; margin-top:2px;
  image-rendering: pixelated;
}
.agent-card .status-dot.active { background:var(--active-green); box-shadow:0 0 4px var(--active-green); }
.agent-card .status-dot.idle { background:var(--idle-yellow); }
.agent-card .status-dot.stopped { background:var(--stopped-gray); }
.agent-info { flex:1; min-width:0; }
.agent-name { color:#facc15; font-size:8px; }
.agent-status { color:var(--text-dim); }
.agent-task { color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:200px; }
.agent-meta { color:var(--text-dim); font-size:6px; }

/* ── Animations ── */
@keyframes typing-l {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}
@keyframes typing-r {
  0%,100% { transform: translateY(-3px); }
  50% { transform: translateY(0); }
}
@keyframes idle-bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-2px); }
}
@keyframes zzz-float {
  0% { opacity:1; transform:translate(0,0); }
  100% { opacity:0; transform:translate(4px,-12px); }
}
@keyframes cursor-blink {
  0%,49% { opacity:1; }
  50%,100% { opacity:0; }
}
@keyframes cloud-drift {
  0% { transform:translateX(0); }
  100% { transform:translateX(60px); }
}
@keyframes clock-tick {
  0%,100% { opacity:1; }
  50% { opacity:.5; }
}
@keyframes screen-scroll {
  0% { transform:translateY(0); }
  100% { transform:translateY(-8px); }
}
@keyframes breathe {
  0%,100% { transform:scaleY(1); }
  50% { transform:scaleY(1.02); }
}
@keyframes particle-float {
  0% { opacity:.8; transform:translateY(0) scale(1); }
  100% { opacity:0; transform:translateY(-20px) scale(.5); }
}

/* ── Responsive ── */
@media (max-width:600px) {
  .status-bar { font-size:6px; height:36px; padding:0 6px; }
  .sb-title { font-size:7px; }
  .main-wrap { margin-top:36px; }
  .info-panel { font-size:6px; padding:6px 8px; }
  .agent-grid { grid-template-columns:1fr; }
  .agent-card { font-size:6px; }
  .panel-title { font-size:7px; }
  .sb-hp-bar { width:32px; }
  .sb-metric .sb-label { display:none; }
}
</style>
</head>

  pink:   { hair:'#f472b6', skin:'#fde0c8', shirt:'#db2777', pants:'#831843', eye:'#1a1a2e', shoes:'#1a1a2e' },
  yellow: { hair:'#facc15', skin:'#fde0c8', shirt:'#ca8a04', pants:'#713f12', eye:'#1a1a2e', shoes:'#1a1a2e' },

  purple: { hair:'#a78bfa', skin:'#fde0c8', shirt:'#7c3aed', pants:'#3b0764', eye:'#1a1a2e', shoes:'#1a1a2e' },
  orange: { hair:'#fb923c', skin:'#fde0c8', shirt:'#ea580c', pants:'#7c2d12', eye:'#1a1a2e', shoes:'#1a1a2e' },
  red:    { hair:'#f87171', skin:'#fcd9bd', shirt:'#dc2626', pants:'#450a0a', eye:'#1a1a2e', shoes:'#1a1a2e' },
  teal:   { hair:'#2dd4bf', skin:'#fcd9bd', shirt:'#0d9488', pants:'#134e4a', eye:'#1a1a2e', shoes:'#1a1a2e' },
}
const COLOR_KEYS = Object.keys(COLORS)

function charColor(sessionId) {
  let h = 0
  for (const c of sessionId) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff
  return COLOR_KEYS[Math.abs(h) % COLOR_KEYS.length]
}

// ── Pixel Sprite Renderer ──
// Each sprite pixel = 4x4 SVG units. Sprites are 9 wide x 16 tall
const P = 4 // pixel size

function renderSprite(data, x, y, colors) {
  let svg = ''
  for (let ry = 0; ry < data.length; ry++) {
    for (let rx = 0; rx < data[ry].length; rx++) {
      const cell = data[ry][rx]
      if (!cell) continue
      const color = colors[cell] || cell
      svg += `<rect x="${x + rx * P}" y="${y + ry * P}" width="${P}" height="${P}" fill="${color}"/>`
    }
  }
  return svg
}

// ── Sprite Data ──
// Legend: h=hair, s=skin, e=eye, t=shirt, p=pants, o=shoes, null=transparent
// Working (sitting, facing front) - 9w x 16h

// Idle (standing, slight variation) - 9w x 16h
const SPRITE_IDLE = [

// ── Render character SVG ──
function svgWorking(ck, uniqueId) {
  const c = COLORS[ck]
  const colorMap = { h:c.hair, s:c.skin, e:c.eye, t:c.shirt, p:c.pants, o:c.shoes }
  const body = renderSprite(SPRITE_WORKING, 0, 0, colorMap)
  // Arms with animation
  const armLColors = { t:c.shirt, s:c.skin }
  const armRColors = { t:c.shirt, s:c.skin }
  const leftArm = renderSprite(ARM_LEFT, -2 * P, 9 * P, armLColors)
  const rightArm = renderSprite(ARM_RIGHT, 9 * P, 9 * P, armRColors)

  return `<g>
    ${body}
    <g class="typing-arm-l">${leftArm}</g>
    <g class="typing-arm-r">${rightArm}</g>
  </g>`
}

function svgIdle(ck) {
  const c = COLORS[ck]
  const colorMap = { h:c.hair, s:c.skin, e:c.eye, t:c.shirt, p:c.pants, o:c.shoes, w:'#e07060' }
  const body = renderSprite(SPRITE_IDLE, 0, 0, colorMap)
  return `<g class="idle-anim">${body}</g>`
}

function svgSleeping(ck) {
  const c = COLORS[ck]
  const colorMap = { h:c.hair, s:c.skin, e:c.eye, t:c.shirt, p:c.pants, o:c.shoes, '_':'#4a4a5a' }

      <rect x="${18*P}" y="${-4*P}" width="${P}" height="${P}" fill="#8080a0" opacity=".5"/>

      <rect x="${19*P}" y="${-6*P}" width="${P}" height="${P}" fill="#6060a0" opacity=".4"/>
    </g>

  return `<g class="breathe-anim">${body}</g>${zzz}`
}

// ── Status bubble (pixel art style) ──
function svgBubble(text, color, x, y) {
  const charW = 7
  const w = text.length * charW + 12
  return `
    <g transform="translate(${x},${y})">
      <rect x="${-w/2}" y="-12" width="${w}" height="14" fill="#1e1e32" stroke="${color}" stroke-width="2"/>
      <rect x="${-w/2+1}" y="-11" width="${w-2}" height="12" fill="#1e1e32"/>
      <text x="0" y="-2" text-anchor="middle" font-size="6" fill="${color}" class="pixel-font">${text}</text>
      <!-- arrow -->
      <rect x="-2" y="2" width="4" height="4" fill="#1e1e32" stroke="${color}" stroke-width="1" transform="rotate(45,-0,4)"/>
      <rect x="-3" y="1" width="6" height="3" fill="#1e1e32"/>
    </g>`
}

// ── Task label ──
function taskLabel(agent) {
  const t = (agent.last_tool || '').toLowerCase()
  if (t.includes('edit') || t.includes('write')) return 'コーディング'
  if (t.includes('read') || t.includes('grep') || t.includes('glob')) return 'リサーチ'
  if (t.includes('bash')) return 'ビルド中'
  if (agent.status === 'active') return 'タスク実行中'
  if (agent.status === 'idle') return 'スタンバイ'
  return 'スリープ'
}

function accentForType(ck) {
  return COLORS[ck]?.hair || '#a78bfa'
}

// ── Time helpers ──
function timeAgo(iso) {
  const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000)
  if (s < 60) return s + '秒前'
  if (s < 3600) return Math.floor(s / 60) + '分前'
  return Math.floor(s / 3600) + '時間前'
}
function elapsed(iso) {
  const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000)
  const m = Math.floor(s / 60), h = Math.floor(m / 60)
  if (h > 0) return h + 'h ' + m % 60 + 'm'
  if (m > 0) return m + 'm ' + s % 60 + 's'
  return s + 's'
}

// ── Default agents ──
const DEFAULTS = [
  { session_id:'default-blue',   project:'Agent-A', status:'idle',    last_tool:'', last_desc:'タスク待ち...', tool_count:0, started_at:new Date().toISOString(), last_seen:new Date().toISOString(), history:[], _default:true },
  { session_id:'default-pink',   project:'Agent-B', status:'stopped', last_tool:'', last_desc:'うたた寝中', tool_count:0, started_at:new Date().toISOString(), last_seen:new Date().toISOString(), history:[], _default:true },
  { session_id:'default-yellow', project:'Agent-C', status:'idle',    last_tool:'', last_desc:'スタンバイOK', tool_count:0, started_at:new Date().toISOString(), last_seen:new Date().toISOString(), history:[], _default:true },
  { session_id:'default-green',  project:'Agent-D', status:'idle',    last_tool:'', last_desc:'いつでも行ける', tool_count:0, started_at:new Date().toISOString(), last_seen:new Date().toISOString(), history:[], _default:true },
  { session_id:'default-purple', project:'Agent-E', status:'stopped', last_tool:'', last_desc:'充電中...', tool_count:0, started_at:new Date().toISOString(), last_seen:new Date().toISOString(), history:[], _default:true },
  { session_id:'default-orange', project:'Agent-F', status:'idle',    last_tool:'', last_desc:'準備万端', tool_count:0, started_at:new Date().toISOString(), last_seen:new Date().toISOString(), history:[], _default:true },
]

// ── Update wall clock ──
function updateClock() {
  const now = new Date()
  const h = String(now.getHours()).padStart(2, '0')
  const m = String(now.getMinutes()).padStart(2, '0')
  const el = document.getElementById('clock-text')
  if (el) el.textContent = h + ':' + m
}
updateClock()
setInterval(updateClock, 10000)

// ── Particles ──
function spawnParticle() {
  const particles = document.getElementById('particles')
  if (!particles) return
  const x = 100 + Math.random() * 760
  const y = 200 + Math.random() * 300
  const colors = ['#fde68a', '#a78bfa', '#4ade80', '#f472b6', '#facc15']
  const color = colors[Math.floor(Math.random() * colors.length)]
  const id = 'p-' + Date.now() + Math.random()
  const el = document.createElementNS('http://www.w3.org/2000/svg', 'rect')
  el.setAttribute('x', x)
  el.setAttribute('y', y)
  el.setAttribute('width', '3')
  el.setAttribute('height', '3')
  el.setAttribute('fill', color)
  el.setAttribute('opacity', '0.6')
  el.style.animation = 'particle-float 2s ease-out forwards'
  particles.appendChild(el)
  setTimeout(() => el.remove(), 2000)
}
setInterval(spawnParticle, 3000)

// ── Render agents into SVG + info panel ──
function renderRoom(agents) {
  const data = agents.length > 0 ? agents : DEFAULTS
  const active = data.filter(a => a.status === 'active')
  const nonActive = data.filter(a => a.status !== 'active')

  // Clear all slots
  const allSlotIds = ['desk-slot-0','desk-slot-1','desk-slot-2','sofa-slot-0','sofa-slot-1','stand-slot-0','stand-slot-1','stand-slot-2']
  allSlotIds.forEach(id => { const el = document.getElementById(id); if (el) el.innerHTML = '' })
  for (let i = 0; i < 3; i++) {
    const screen = document.getElementById('screen-' + i)
    if (screen) screen.setAttribute('fill', '#1a2a1a')
  }

  // Desk slots (up to 3 active agents)
  for (let i = 0; i < 3 && i < active.length; i++) {
    const slot = document.getElementById('desk-slot-' + i)
    const screen = document.getElementById('screen-' + i)
    const a = active[i], ck = charColor(a.session_id)
    const label = taskLabel(a)
    const charSvg = svgWorking(ck, i)
    const bubble = svgBubble(label, accentForType(ck), 18, -8)
    slot.innerHTML = `<g transform="translate(-18,-44)">${charSvg}</g>${bubble}`
    if (screen) screen.setAttribute('fill', '#0a1a0a')
  }

  // Non-active agents: distribute across sofa (sleeping) + stand (idle) + remaining desk
  const sleeping = nonActive.filter(a => a.status === 'stopped' || (a._default && a.last_desc.includes('寝')))
  const idleAgents = nonActive.filter(a => !(a.status === 'stopped' || (a._default && a.last_desc.includes('寝'))))

  // Sofa slots for sleeping agents (up to 2)
  for (let i = 0; i < 2 && i < sleeping.length; i++) {
    const slot = document.getElementById('sofa-slot-' + i)
    const a = sleeping[i], ck = charColor(a.session_id)
    const charSvg = svgSleeping(ck)
    const bubble = svgBubble('スリープ', '#6b7280', 32, -12)
    slot.innerHTML = `<g transform="translate(-8, 8)">${charSvg}</g>${bubble}`
  }

  // Remaining sleeping agents overflow to standing
  const overflowSleeping = sleeping.slice(2)

  // Idle agents: fill standing slots, then empty desk slots
  const standAgents = [...idleAgents, ...overflowSleeping]
  let standIdx = 0

  // Fill standing slots (up to 3)
  for (let i = 0; i < 3 && standIdx < standAgents.length; i++, standIdx++) {
    const slot = document.getElementById('stand-slot-' + i)
    const a = standAgents[standIdx], ck = charColor(a.session_id)
    const label = a.status === 'stopped' ? 'スリープ' : 'スタンバイ'
    const color = a.status === 'stopped' ? '#6b7280' : accentForType(ck)
    const charSvg = svgIdle(ck)
    const bubble = svgBubble(label, color, 18, -8)
    slot.innerHTML = `<g transform="translate(-18,-44)">${charSvg}</g>${bubble}`
  }

  // Remaining idle agents sit at empty desks
  for (let i = 0; i < 3 && standIdx < standAgents.length; i++) {
    const slot = document.getElementById('desk-slot-' + i)
    if (slot.innerHTML !== '') continue
    const a = standAgents[standIdx], ck = charColor(a.session_id)
    const charSvg = svgIdle(ck)
    const bubble = svgBubble('スタンバイ', accentForType(ck), 18, -8)
    slot.innerHTML = `<g transform="translate(-18,-44)">${charSvg}</g>${bubble}`
    standIdx++
  }

  // Info panel
  const panel = document.getElementById('agent-panel')
  const cards = data.map(a => {
    const ck = charColor(a.session_id)
    const col = accentForType(ck)
    const stClass = a.status === 'active' ? 'active' : a.status === 'idle' ? 'idle' : 'stopped'
    const stText = a.status === 'active' ? '稼働中' : a.status === 'idle' ? '待機中' : '停止'
    const desc = a.last_desc || a.last_tool || (a.status === 'active' ? '処理中...' : '待機中')
    const uptime = elapsed(a.started_at)
    return `<div class="agent-card">
      <div class="status-dot ${stClass}"></div>
      <div class="agent-info">
        <div class="agent-name" style="color:${col};">${a.project}</div>
        <div class="agent-status">[${stText}] ツール: ${a.tool_count}回</div>
        <div class="agent-task">${desc}</div>
        <div class="agent-meta">稼働時間: ${uptime} | 最終: ${timeAgo(a.last_seen)}</div>
      </div>
    </div>`
  })
  panel.innerHTML = cards.join('')

  // Update status bar
  const activeCount = active.length
  const totalCount = data.length
  document.getElementById('sb-active-count').textContent = activeCount + '/' + totalCount

  const hpPct = Math.min(100, 20 + activeCount * 25 + Math.floor(Math.random() * 5))
  const mpPct = Math.min(100, 30 + totalCount * 10 + Math.floor(Math.random() * 5))
  const hpEl = document.getElementById('sb-hp')
  const mpEl = document.getElementById('sb-mp')
  hpEl.style.width = hpPct + '%'
  hpEl.style.background = hpPct > 60 ? 'var(--active-green)' : hpPct > 30 ? 'var(--idle-yellow)' : '#ef4444'
  mpEl.style.width = mpPct + '%'
}

// ── Polling ──
let lastFetch = null

async function fetchAgents() {
  if (VPS_URL.includes('YOUR_VPS_IP')) return

  const spinner = document.getElementById('spinner')
  spinner.classList.add('show')

  try {
    const res = await fetch(`${VPS_URL}/api/agents`)
    const data = await res.json()
    renderRoom(data)
    lastFetch = new Date()
    updateInfo()
  } catch (e) {
    document.getElementById('update-info').textContent = '接続エラー'
    renderRoom([])
  } finally {
    spinner.classList.remove('show')
  }
}

function updateInfo() {
  if (!lastFetch) return
  const sec = Math.floor((Date.now() - lastFetch) / 1000)
  document.getElementById('update-info').textContent = `${sec}秒前 | ${POLL_INTERVAL / 1000}s間隔`
}

// Init
renderRoom([])
fetchAgents()
setInterval(fetchAgents, POLL_INTERVAL)
setInterval(updateInfo, 1000)
</script>
