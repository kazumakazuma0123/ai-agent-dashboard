<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent Monitor — Cyber Room</title>
<style>
:root {
  --bg: #08061a;
  --neon-blue: #38bdf8;
  --neon-pink: #f472b6;
  --neon-green: #4ade80;
  --neon-yellow: #facc15;
  --neon-purple: #a78bfa;
  --neon-orange: #fb923c;
  --text: #dde0ff;
  --dim: #5a5c90;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── top status bar ── */
.status-bar {
  position: fixed; top:0; left:0; right:0; z-index:200;
  background: rgba(8,6,26,.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(167,139,250,.12);
  padding: 0 20px;
  height: 38px;
  display: flex; align-items: center; justify-content: space-between;
  font-size: .68rem;
}
.sb-left { display:flex; align-items:center; gap:16px; }
.sb-title {
  font-weight:700; font-size:.75rem;
  background: linear-gradient(135deg,#38bdf8,#a78bfa,#f472b6);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.sb-label { color:var(--dim); text-transform:uppercase; letter-spacing:.08em; font-size:.58rem; }
.sb-metric {
  display:flex; align-items:center; gap:5px;
}
.sb-bar-wrap {
  width:48px; height:5px; background:rgba(255,255,255,.06); border-radius:3px; overflow:hidden;
}
.sb-bar {
  height:100%; border-radius:3px; transition: width .5s;
}
.sb-val { font-variant-numeric:tabular-nums; min-width:26px; text-align:right; }
.sb-right { display:flex; align-items:center; gap:14px; }
#update-info { color:var(--dim); font-variant-numeric:tabular-nums; }
.refresh-btn {
  background:none; border:1px solid rgba(167,139,250,.25); color:var(--dim);
  padding:3px 10px; border-radius:5px; cursor:pointer; font-size:.65rem;
  transition:all .2s;
}
.refresh-btn:hover { border-color:var(--neon-purple); color:var(--neon-purple); }
.spinner {
  width:11px; height:11px; border-radius:50%;
  border:2px solid rgba(167,139,250,.15); border-top-color:var(--neon-purple);
  animation:spin .8s linear infinite; display:none;
}
.spinner.show { display:inline-block; }
@keyframes spin { to{transform:rotate(360deg);} }

/* ── room viewport ── */
.room-viewport {
  margin-top: 38px;
  width: 100%;
  min-height: calc(100vh - 38px);
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(ellipse at 25% 15%, rgba(167,139,250,.07) 0%, transparent 50%),
    radial-gradient(ellipse at 75% 85%, rgba(56,189,248,.05) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(244,114,182,.03) 0%, transparent 60%),
    var(--bg);
}

/* ── isometric room SVG ── */
.room-svg {
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  display: block;
}

/* ── neon sign ── */
.neon-sign-top {
  position: absolute; top: 50px; right: 40px; z-index:10;
  font-size: .9rem; font-weight: 800;
  color: var(--neon-pink);
  text-shadow: 0 0 8px var(--neon-pink), 0 0 25px var(--neon-pink), 0 0 50px rgba(244,114,182,.25);
  animation: neon-flicker 5s infinite;
  font-family: monospace;
}
@keyframes neon-flicker {
  0%,18%,22%,25%,53%,57%,100% { opacity:1; }
  20%,24%,55% { opacity:.5; }
}

/* ── floating UI panels ── */
.float-panel {
  position: absolute;
  background: rgba(14,12,35,.88);
  border: 1px solid rgba(167,139,250,.15);
  border-radius: 10px;
  padding: 10px 14px;
  backdrop-filter: blur(8px);
  font-size: .68rem;
  z-index: 20;
  pointer-events: auto;
}
.float-panel::before {
  content:'';
  position:absolute; top:-1px; left:15%; right:15%; height:1px;
  background: linear-gradient(90deg, transparent, var(--neon-purple), transparent);
}
.fp-title {
  font-size:.56rem; text-transform:uppercase; letter-spacing:.12em;
  color: var(--neon-purple); margin-bottom:6px; font-weight:600;
}

/* tasks panel */
.tasks-panel { top:15%; left: 2%; width:200px; }
.task-item {
  display:flex; align-items:center; gap:6px;
  padding: 3px 0; color: var(--dim);
}
.task-dot { width:4px; height:4px; border-radius:50%; flex-shrink:0; }
.task-dot.run { background:var(--neon-green); box-shadow:0 0 6px var(--neon-green); }
.task-dot.idle { background:var(--neon-yellow); }
.task-dot.off { background:#4a4a6a; }
.task-text { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.task-text.active { color: var(--neon-green); }

/* agents panel */
.agents-panel { top:15%; right:2%; width:180px; }
.ap-row {
  display:flex; align-items:center; gap:7px; padding:3px 0;
}
.ap-avatar { width:18px; height:18px; border-radius:50%; flex-shrink:0; }
.ap-name { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ap-status {
  font-size:.55rem; padding:1px 6px; border-radius:8px;
  font-weight:600; flex-shrink:0;
}
.ap-status.active { background:rgba(74,222,128,.12); color:var(--neon-green); }
.ap-status.idle { background:rgba(250,204,21,.1); color:var(--neon-yellow); }
.ap-status.stopped { background:rgba(100,100,140,.1); color:#6a6a8a; }

/* ── agent status bubbles in SVG ── */
.agent-bubble {
  font-family: 'Segoe UI', system-ui, sans-serif;
  pointer-events: none;
}

/* ── ambient ── */
.particles {
  position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;
}
.particle {
  position:absolute; width:2px; height:2px;
  border-radius:50%; opacity:0;
  animation: float-up linear infinite;
}
@keyframes float-up {
  0%{opacity:0;transform:translateY(0);}
  10%{opacity:.3;}
  90%{opacity:.3;}
  100%{opacity:0;transform:translateY(-100vh);}
}

/* ── character animations ── */
@keyframes blink { 0%,87%,100%{transform:scaleY(1);}91%{transform:scaleY(.08);} }
@keyframes tap-l { 0%,100%{transform:rotate(-6deg) translateY(0);}50%{transform:rotate(-6deg) translateY(4px);} }
@keyframes tap-r { 0%,100%{transform:rotate(6deg) translateY(4px);}50%{transform:rotate(6deg) translateY(0);} }
@keyframes look-lr { 0%,15%,100%{transform:translateX(0);}40%,55%{transform:translateX(-3px);}75%{transform:translateX(3px);} }
@keyframes head-tilt { 0%,100%{transform:rotate(0);}30%{transform:rotate(-3deg);}70%{transform:rotate(2deg);} }
@keyframes float-idle { 0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);} }
@keyframes breathe { 0%,100%{transform:scale(1);}50%{transform:scale(1.02);} }
@keyframes tail-wag { 0%,100%{transform:rotate(-15deg);}50%{transform:rotate(15deg);} }
@keyframes cat-walk { 0%{transform:translateX(0);}50%{transform:translateX(12px);}100%{transform:translateX(0);} }
@keyframes scan-line { 0%{transform:translateY(-100%);}100%{transform:translateY(100%);} }
@keyframes glow-pulse { 0%,100%{opacity:.6;}50%{opacity:1;} }
@keyframes typing-cursor { 0%,49%{opacity:1;}50%,100%{opacity:0;} }
@keyframes hologram-flicker { 0%,100%{opacity:.85;}50%{opacity:.95;}25%,75%{opacity:.7;} }

/* scrollbar */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(167,139,250,.2); border-radius:3px; }

/* responsive */
@media (max-width:900px) {
  .tasks-panel, .agents-panel { display:none; }
  .neon-sign-top { font-size:.7rem; right:15px; top:48px; }
}
@media (max-width:600px) {
  .sb-metric { display:none; }
}
</style>

;(function(){

    const cols = ['#a78bfa','#38bdf8','#f472b6','#4ade80']

// ── Agent character SVG generators (smaller for room view) ──
const COLORS = {
  blue:   { body:'#38bdf8', dark:'#0369a1', light:'#bae6fd', eye:'#082f49' },
  pink:   { body:'#f472b6', dark:'#9d174d', light:'#fce7f3', eye:'#1a0f2e' },
  yellow: { body:'#eab308', dark:'#a16207', light:'#fef9c3', eye:'#1c1004' },
  green:  { body:'#22c55e', dark:'#16a34a', light:'#bbf7d0', eye:'#052e16' },
  purple: { body:'#a78bfa', dark:'#6d28d9', light:'#ede9fe', eye:'#1e1040' },
  orange: { body:'#fb923c', dark:'#c2410c', light:'#ffedd5', eye:'#1a0800' },
}
const COLOR_KEYS = Object.keys(COLORS)

function charColor(sessionId) {
  let h = 0
  for (const c of sessionId) h = (h*31 + c.charCodeAt(0)) & 0xffffffff
  return COLOR_KEYS[Math.abs(h) % COLOR_KEYS.length]
}

// working character (at desk, typing)
function svgWorking(ck) {
  const c = COLORS[ck]
  return `
    <g transform="scale(.55)">
      <polygon points="18,26 28,6 40,26" fill="${c.dark}"/>
      <polygon points="22,26 28,12 36,26" fill="${c.light}"/>

      <g style="transform-origin:50px 42px;animation:blink 5s infinite;">
        <ellipse cx="38" cy="42" rx="5" ry="6" fill="${c.eye}"/>
        <ellipse cx="62" cy="42" rx="5" ry="6" fill="${c.eye}"/>

        <circle cx="64" cy="40" r="2" fill="white"/>

      <polygon points="47,52 53,52 50,56" fill="${c.dark}"/>
      <rect x="26" y="72" width="48" height="30" rx="10" fill="${c.dark}"/>
      <g style="transform-origin:32px 78px;animation:tap-l .55s ease-in-out infinite;">

    </g>`
}

// status bubble
function svgBubble(text, color, x, y) {
  const w = text.length * 5.5 + 16
  return `
    <g class="agent-bubble" transform="translate(${x},${y})">
      <rect x="${-w/2}" y="-14" width="${w}" height="16" rx="8" fill="rgba(14,12,35,.85)" stroke="${color}" stroke-width=".8"/>
      <circle cx="${-w/2+8}" cy="-6" r="2.5" fill="${color}" style="animation:glow-pulse 2s infinite;"/>
      <text x="2" y="-3" text-anchor="middle" font-size="6.5" fill="${color}" font-family="monospace" font-weight="600">${text}</text>
      <polygon points="-3,2 3,2 0,7" fill="rgba(14,12,35,.85)"/>
    </g>`
}

// ── task label from tool ──
function taskLabel(agent) {
  const t = (agent.last_tool || '').toLowerCase()
  if (t.includes('edit') || t.includes('write')) return 'CODING'
  if (t.includes('read') || t.includes('grep') || t.includes('glob')) return 'ANALYZING'
  if (t.includes('bash')) return 'BUILDING'
  if (agent.status === 'active') return 'BUSY'
  if (agent.status === 'idle') return 'RELAXING'
  return 'SLEEPING'
}

function accentForType(ck) {
  return COLORS[ck]?.body || '#a78bfa'
}

// ── time helpers ──
function timeAgo(iso) {
  const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000)
  if (s < 60) return s+'秒前'
  if (s < 3600) return Math.floor(s/60)+'分前'
  return Math.floor(s/3600)+'時間前'
}
function elapsed(iso) {
  const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000)
  const m = Math.floor(s/60), h = Math.floor(m/60)
  if (h>0) return h+'h '+m%60+'m'
  if (m>0) return m+'m '+s%60+'s'
  return s+'s'
}

// ── default agents (when API returns empty) ──
const DEFAULTS = [
  { session_id:'default-blue',   project:'Agent-A', status:'idle',    last_tool:'', last_desc:'タスク待ち...', tool_count:0, started_at:new Date().toISOString(), last_seen:new Date().toISOString(), history:[], _default:true },
  { session_id:'default-pink',   project:'Agent-B', status:'stopped', last_tool:'', last_desc:'うたた寝中', tool_count:0, started_at:new Date().toISOString(), last_seen:new Date().toISOString(), history:[], _default:true },
  { session_id:'default-yellow', project:'Agent-C', status:'idle',    last_tool:'', last_desc:'スタンバイOK', tool_count:0, started_at:new Date().toISOString(), last_seen:new Date().toISOString(), history:[], _default:true },
  { session_id:'default-green',  project:'Agent-D', status:'idle',    last_tool:'', last_desc:'いつでも行ける', tool_count:0, started_at:new Date().toISOString(), last_seen:new Date().toISOString(), history:[], _default:true },
  { session_id:'default-purple', project:'Agent-E', status:'stopped', last_tool:'', last_desc:'充電中...', tool_count:0, started_at:new Date().toISOString(), last_seen:new Date().toISOString(), history:[], _default:true },
  { session_id:'default-orange', project:'Agent-F', status:'idle',    last_tool:'', last_desc:'準備万端', tool_count:0, started_at:new Date().toISOString(), last_seen:new Date().toISOString(), history:[], _default:true },
]

// ── render agents into SVG slots ──
function renderRoom(agents) {
  const data = agents.length > 0 ? agents : DEFAULTS

  const active = data.filter(a => a.status === 'active')
  const idle = data.filter(a => a.status !== 'active')

  // desk slots (up to 3 active)
  for (let i = 0; i < 3; i++) {
    const slot = document.getElementById('desk-slot-'+i)
    if (active[i]) {
      const a = active[i], ck = charColor(a.session_id)
      const label = taskLabel(a)
      slot.innerHTML = svgWorking(ck) + svgBubble(label, accentForType(ck), 28, -15)
    } else {
      slot.innerHTML = ''
    }
  }

  // whiteboard slot (4th active or first idle with highest tool_count)
  const wbSlot = document.getElementById('wb-slot')
  if (active[3]) {
    const a = active[3], ck = charColor(a.session_id)
    wbSlot.innerHTML = svgPresenter(ck) + svgBubble('PRESENTING', accentForType(ck), 28, -15)
  } else if (active.length > 0) {
    // no one at whiteboard when less than 4 active
    wbSlot.innerHTML = ''
  } else {
    wbSlot.innerHTML = ''
  }

  // sofa slots (idle agents — up to 2 shown, rest go to extra active or are implied)
  for (let i = 0; i < 2; i++) {
    const slot = document.getElementById('sofa-slot-'+i)
    if (idle[i]) {
      const a = idle[i], ck = charColor(a.session_id)
      const isSleeping = a.status === 'stopped' || (a._default && a.last_desc.includes('寝'))
      const label = isSleeping ? 'SLEEPING' : 'RELAXING'
      const svgFn = isSleeping ? svgSleeping : svgIdle
      slot.innerHTML = svgFn(ck) + svgBubble(label, accentForType(ck), 28, -15)
    } else {
      slot.innerHTML = ''
    }
  }

  // update tasks panel
  const tasksList = document.getElementById('tasks-list')
  const taskItems = data.map(a => {
    const isActive = a.status === 'active'
    const dotClass = isActive ? 'run' : a.status === 'idle' ? 'idle' : 'off'
    const desc = a.last_desc || a.last_tool || (isActive ? 'Processing...' : 'Idle')
    return `<div class="task-item">
      <div class="task-dot ${dotClass}"></div>
      <span class="task-text ${isActive?'active':''}">${desc}</span>
    </div>`
  })
  tasksList.innerHTML = taskItems.join('')

  // update agents panel
  const agentsList = document.getElementById('agents-list')
  const apItems = data.map(a => {
    const ck = charColor(a.session_id)
    const col = accentForType(ck)
    const stLabel = a.status === 'active' ? 'BUSY' : a.status === 'idle' ? 'IDLE' : 'OFF'
    return `<div class="ap-row">
      <div class="ap-avatar" style="background:${col};"></div>
      <span class="ap-name">${a.project}</span>
      <span class="ap-status ${a.status}">${stLabel}</span>
    </div>`
  })
  agentsList.innerHTML = apItems.join('')

  // update status bar metrics
  const activeCount = active.length
  const cpuPct = Math.min(95, 15 + activeCount * 20 + Math.floor(Math.random()*5))
  const memPct = Math.min(90, 30 + activeCount * 12 + Math.floor(Math.random()*5))
  document.getElementById('sb-cpu').style.width = cpuPct+'%'
  document.getElementById('sb-cpu-val').textContent = cpuPct+'%'
  document.getElementById('sb-mem').style.width = memPct+'%'
  document.getElementById('sb-mem-val').textContent = memPct+'%'
  document.getElementById('sb-net').style.width = agents.length > 0 ? '85%' : '40%'
}

// ── polling ──
let lastFetch = null

async function fetchAgents() {
  if (VPS_URL.includes('YOUR_VPS_IP')) return

  const spinner = document.getElementById('spinner')
  spinner.classList.add('show')

  try {
    const res = await fetch(`${VPS_URL}/api/agents`)
    const data = await res.json()
    renderRoom(data)
    lastFetch = new Date()
    updateInfo()
  } catch (e) {
    document.getElementById('update-info').textContent = '⚠ VPSに接続できません'
    renderRoom([]) // show defaults
  } finally {
    spinner.classList.remove('show')
  }
}

function updateInfo() {
  if (!lastFetch) return
  const sec = Math.floor((Date.now() - lastFetch) / 1000)
  document.getElementById('update-info').textContent = `${sec}秒前 | ${POLL_INTERVAL/1000}s間隔`
}

// init
renderRoom([])
fetchAgents()
setInterval(fetchAgents, POLL_INTERVAL)
setInterval(updateInfo, 1000)
</script>
