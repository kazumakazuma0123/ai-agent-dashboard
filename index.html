<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Agent Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root {
  --wall: #f8f0d8;
  --floor-a: #f0f0f0;
  --floor-b: #d8d8e0;
  --desk: #b07848;
  --desk-dark: #885830;
  --monitor-body: #384048;
  --monitor-border: #484858;
  --chair: #c03030;
  --plant-a: #48a848;
  --plant-b: #307830;
  --sky: #88c8e8;
  --bg: #181828;
  --panel-bg: #181830;
  --panel-border: #b8a878;
  --text: #f8f0d8;
  --text-dim: #908870;
  --active-green: #48c048;
  --idle-yellow: #f8c818;
  --stopped-gray: #687080;
  --pixel: 4px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Press Start 2P', monospace;
  min-height: 100vh;
  overflow-x: hidden;
  image-rendering: pixelated;
  -ms-interpolation-mode: nearest-neighbor;
}

/* ── RPG Status Bar ── */
.status-bar {
  position: fixed; top:0; left:0; right:0; z-index:200;
  background: var(--panel-bg);
  border-bottom: 4px solid var(--panel-border);
  padding: 0 12px;
  height: 44px;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 8px;
  image-rendering: pixelated;
}
.sb-left { display:flex; align-items:center; gap:12px; }
.sb-title {
  font-size:9px; color:#f8c818;
  text-shadow: 2px 2px 0 #706028;
  letter-spacing: 1px;
}
.sb-metric { display:flex; align-items:center; gap:6px; color:var(--text-dim); }
.sb-label { font-size:7px; }
.sb-val {
  color:var(--text); font-variant-numeric:tabular-nums;
  min-width:20px; text-align:right;
}
.sb-hp-bar {
  width:48px; height:8px; background:#333;
  border: 2px solid #555; position:relative;
}
.sb-hp-fill {
  height:100%; transition: width .5s;
}
.sb-right { display:flex; align-items:center; gap:10px; }
#update-info { color:var(--text-dim); font-size:7px; }
.refresh-btn {
  background: var(--panel-bg); border:2px solid var(--panel-border);
  color:var(--text); padding:4px 8px; cursor:pointer;
  font-family:'Press Start 2P', monospace; font-size:7px;
  transition:all .15s;
}
.refresh-btn:hover { background:var(--panel-border); color:#181828; }
.refresh-btn:active { transform:scale(.95); }
.spinner {
  width:10px; height:10px; border-radius:50%;
  border:2px solid #333; border-top-color:var(--idle-yellow);
  animation:spin .6s linear infinite; display:none;
}
.spinner.show { display:inline-block; }
@keyframes spin { to{transform:rotate(360deg);} }

/* ── Main Layout ── */
.main-wrap {
  margin-top: 44px;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: calc(100vh - 44px);
  background: radial-gradient(ellipse at 50% 30%, rgba(200,180,140,.08), transparent 70%), var(--bg);
  padding-bottom: 10px;
}

/* ── SVG Scene ── */
.scene-wrap {
  width: 100%;
  max-width: 1400px;
  position: relative;
}
.scene-svg {
  width: 100%;
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}

/* ── Info Panel (RPG Dialogue Box) ── */
.info-panel {
  width: 100%;
  max-width: 1380px;
  margin: 8px auto 0;
  background: var(--panel-bg);
  border: 4px solid var(--panel-border);
  border-radius: 0;
  padding: 10px 14px;
  position: relative;
}
.info-panel::before {
  content:'';
  position:absolute; top:4px; left:4px; right:4px; bottom:4px;
  border:2px solid rgba(184,168,120,.3);
  pointer-events:none;
}
.panel-title {
  font-size:8px; color:#f8c818;
  text-shadow:1px 1px 0 #706028;
  margin-bottom:8px;
  letter-spacing:1px;
}
.agent-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap:8px;
}
.agent-card {
  background:rgba(255,255,255,.03);
  border:2px solid rgba(184,168,120,.25);
  border-left:4px solid var(--stopped-gray);
  padding:8px 10px;
  display:flex; align-items:flex-start; gap:10px;
  font-size:7px; line-height:1.6;
}
.agent-card.is-active {
  border-left-color:var(--active-green);
  border-left-width:6px;
  background:rgba(72,192,72,.08);
  border:2px solid rgba(72,192,72,.3);
  border-left:6px solid var(--active-green);
  box-shadow: 0 0 12px rgba(72,192,72,.15);
}
.agent-card.is-active .agent-name { font-size:9px; }
.agent-card.is-active .agent-task {
  font-size:8px;
  white-space:normal;
  max-width:none;
  color:var(--active-green);
}
.agent-card.is-idle {
  border-left-color:var(--idle-yellow);
  opacity:.7;
  padding:6px 10px;
}
.agent-card.is-idle .agent-task { font-size:6px; }
.agent-card .status-dot {
  width:8px; height:8px; flex-shrink:0; margin-top:2px;
  image-rendering: pixelated;
}
.agent-card .status-dot.active { background:var(--active-green); box-shadow:0 0 4px var(--active-green); }
.agent-card .status-dot.idle { background:var(--idle-yellow); }
.agent-card .status-dot.stopped { background:var(--stopped-gray); }
.agent-info { flex:1; min-width:0; }
.agent-name { color:#f8c818; font-size:8px; }
.agent-name span { font-size:8px; display:inline; }
.agent-status { color:var(--text-dim); }
.agent-task { color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:200px; }
.agent-meta { color:var(--text-dim); font-size:6px; }

/* ── Animations ── */
@keyframes typing-l {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}
@keyframes typing-r {
  0%,100% { transform: translateY(-3px); }
  50% { transform: translateY(0); }
}
@keyframes idle-bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-2px); }
}
@keyframes zzz-float {
  0% { opacity:1; transform:translate(0,0); }
  100% { opacity:0; transform:translate(4px,-12px); }
}
@keyframes cursor-blink {
  0%,49% { opacity:1; }
  50%,100% { opacity:0; }
}
@keyframes cloud-drift {
  0% { transform:translateX(0); }
  100% { transform:translateX(60px); }
}
@keyframes clock-tick {
  0%,100% { opacity:1; }
  50% { opacity:.5; }
}
@keyframes screen-scroll {
  0% { transform:translateY(0); }
  100% { transform:translateY(-8px); }
}
@keyframes breathe {
  0%,100% { transform:scaleY(1); }
  50% { transform:scaleY(1.02); }
}
@keyframes particle-float {
  0% { opacity:.8; transform:translateY(0) scale(1); }
  100% { opacity:0; transform:translateY(-20px) scale(.5); }
}
@keyframes kata-vibrate {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-1px); }
  75% { transform: translateX(1px); }
}
@keyframes kata-text-pop {
  0% { opacity:0; transform: translateY(0); }
  15% { opacity:.9; transform: translateY(-2px); }
  80% { opacity:.9; transform: translateY(-10px); }
  100% { opacity:0; transform: translateY(-16px); }
}
@keyframes walk-bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-2px); }
}
.walk-bounce { animation: walk-bounce 0.3s ease-in-out infinite; }
@keyframes walk-a {
  0%, 49.9% { visibility: visible; }
  50%, 100% { visibility: hidden; }
}
@keyframes walk-b {
  0%, 49.9% { visibility: hidden; }
  50%, 100% { visibility: visible; }
}
.walk-frame-a { animation: walk-a 0.35s steps(1) infinite; }
.walk-frame-b { visibility: hidden; animation: walk-b 0.35s steps(1) infinite; }
@keyframes thought-pop {
  0% { opacity:0; transform: translateY(4px) scale(0.6); }
  12% { opacity:1; transform: translateY(0) scale(1); }
  82% { opacity:1; transform: translateY(0) scale(1); }
  100% { opacity:0; transform: translateY(-8px) scale(0.7); }
}
@keyframes look-around {
  0%,100% { transform: translateX(0); }
  30% { transform: translateX(-2px); }
  70% { transform: translateX(2px); }
}
.thought-anim { animation: thought-pop var(--thought-dur, 4s) ease-in-out forwards; }
.look-anim { animation: look-around 2.5s ease-in-out infinite; }

/* ── Responsive (Tablet) ── */
@media (max-width:768px) {
  .agent-grid { grid-template-columns: repeat(2, 1fr); }
  .agent-task { max-width:160px; }
}

/* ── Responsive (SP) ── */
@media (max-width:600px) {
  .status-bar { font-size:7px; height:36px; padding:0 8px; }
  .sb-title { font-size:7px; }
  .sb-hp-bar { display:none; }
  .sb-metric .sb-label { display:none; }
  .sb-left { gap:8px; }
  #update-info { display:none; }
  .main-wrap { margin-top:36px; padding-bottom:16px; }
  .scene-wrap { width:100%; }
  .info-panel { padding:8px 6px; margin:4px 4px 0; border-width:3px; }
  .info-panel::before { top:3px; left:3px; right:3px; bottom:3px; }
  .panel-title { font-size:9px; margin-bottom:8px; }
  .agent-grid { grid-template-columns:1fr; gap:6px; }
  .agent-card {
    padding:10px 12px; gap:10px; line-height:1.6;
    border-left-width:6px;
  }
  .agent-card .status-dot { width:12px; height:12px; margin-top:1px; }
  .agent-name { font-size:11px; }
  .agent-name span { font-size:8px; display:inline; }
  .agent-status { font-size:9px; margin-top:2px; }
  .agent-task { font-size:9px; max-width:none; white-space:normal; }
}

/* ── Character Popup ── */
.char-popup-overlay {
  position: fixed; top:0; left:0; right:0; bottom:0;
  background: rgba(0,0,0,.5); z-index:300;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
}
.char-popup {
  background: var(--panel-bg);
  border: 4px solid var(--panel-border);
  padding: 16px 20px;
  max-width: 420px; width: 90%;
  font-size: 8px;
  font-family: 'Press Start 2P', monospace;
  position: relative;
  cursor: default;
}
.char-popup::before {
  content:'';
  position:absolute; top:4px; left:4px; right:4px; bottom:4px;
  border:2px solid rgba(184,168,120,.3);
  pointer-events:none;
}
.char-popup-title {
  font-size:10px; color:#f8c818;
  text-shadow:1px 1px 0 #706028;
  margin-bottom:8px;
}
.char-popup-status {
  font-size:8px; color:var(--text-dim);
  margin-bottom:6px;
}
.char-popup-task {
  font-size:9px; color:var(--text);
  margin-bottom:8px;
  line-height:1.6;
}
.char-popup-history {
  font-size:7px; color:var(--text-dim);
  line-height:1.8;
}
.char-popup-history .hist-item {
  display:flex; justify-content:space-between; gap:8px;
  border-bottom:1px solid rgba(184,168,120,.15);
  padding:2px 0;
}
.char-popup-close {
  font-size:7px; color:var(--text-dim);
  text-align:center; margin-top:10px;
}
@media (max-width:600px) {
  .char-popup { max-width: 95%; padding: 14px 12px; }
  .char-popup-title { font-size: 12px; }
  .char-popup-task { font-size: 10px; }
  .char-popup-history { font-size: 8px; }
}

/* ── Active names in status bar ── */
.sb-active-names {
  font-size:7px; color:var(--active-green);
  max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
@media (max-width:600px) {
  .sb-active-names { max-width:120px; font-size:6px; }
}

/* ── Section headers ── */
.section-header {
  font-size:8px;
  color:#f8c818;
  text-shadow:1px 1px 0 #706028;
  margin:10px 0 6px;
  letter-spacing:1px;
  display:flex;
  align-items:center;
  gap:8px;
}
.section-header .count {
  font-size:7px;
  color:var(--text-dim);
}
.section-header.active-section {
  color:var(--active-green);
  text-shadow:1px 1px 0 #1a3a1a;
}
.section-divider {
  height:1px;
  background:rgba(184,168,120,.2);
  margin:8px 0;
}
</style>
</head>
<body>

<!-- RPG Status Bar -->
<div class="status-bar">
  <div class="sb-left">
    <span class="sb-title">▶ Claude Agent Monitor</span>
    <div class="sb-metric">
      <span class="sb-label">稼働:</span>
      <span class="sb-val" id="sb-active-count">0</span>
    </div>
    <div class="sb-metric">
      <span class="sb-label">HP:</span>
      <div class="sb-hp-bar">
        <div class="sb-hp-fill" id="sb-hp" style="width:40%;background:var(--active-green);"></div>
      </div>
    </div>
    <span class="sb-active-names" id="sb-active-names"></span>
    <div class="sb-metric">
      <span class="sb-label">MP:</span>
      <div class="sb-hp-bar">
        <div class="sb-hp-fill" id="sb-mp" style="width:60%;background:#60a5fa;"></div>
      </div>
    </div>
  </div>
  <div class="sb-right">
    <div class="spinner" id="spinner"></div>
    <span id="update-info">接続中...</span>
    <button class="refresh-btn" onclick="fetchAgents()">▶ 更新</button>
  </div>
</div>

<!-- Main Content -->
<div class="main-wrap">
  <div class="scene-wrap">
    <svg class="scene-svg" viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <style>
          .typing-arm-l { animation: typing-l .5s ease-in-out infinite; }
          .typing-arm-r { animation: typing-r .5s ease-in-out infinite; }
          .idle-anim { animation: idle-bounce 2s ease-in-out infinite; }
          .zzz-anim { animation: zzz-float 2s ease-in-out infinite; }
          .cursor-anim { animation: cursor-blink 1s step-end infinite; }
          .cloud-anim { animation: cloud-drift 20s linear infinite; }
          .clock-colon { animation: clock-tick 1s step-end infinite; }
          .screen-lines { animation: screen-scroll 3s linear infinite; }
          .breathe-anim { animation: breathe 3s ease-in-out infinite; }
          .kata-body { animation: kata-vibrate 0.12s ease-in-out infinite; transform-origin: center; }
          .kata-text { animation: kata-text-pop 2s ease-in-out infinite; }
          .kata-text-delay { animation: kata-text-pop 2s ease-in-out infinite; animation-delay: 1s; }
          .pixel-font { font-family: 'Press Start 2P', monospace; }
          @keyframes active-glow {
            0%,100% { opacity:.3; }
            50% { opacity:.7; }
          }
        </style>
      </defs>

      <!-- ====== WALL STRIP (Pokemon-style, y=0 to y=80) ====== -->
      <rect x="0" y="0" width="960" height="80" fill="#f8f0d8"/>
      <!-- wall texture line -->
      <line x1="0" y1="35" x2="960" y2="35" stroke="#e8e0c8" stroke-width="1"/>
      <!-- baseboard (Pokemon-style border) -->
      <rect x="0" y="72" width="960" height="8" fill="#b8a878"/>
      <rect x="0" y="70" width="960" height="2" fill="#d0c090"/>

      <!-- ====== WINDOW on wall (Pokemon-style cross frame) ====== -->
      <g transform="translate(400,8)">
        <rect x="0" y="0" width="160" height="56" fill="#b8a878"/>
        <rect x="4" y="4" width="152" height="48" fill="#88c8e8"/>
        <!-- cross frame -->
        <rect x="78" y="4" width="4" height="48" fill="#b8a878"/>
        <rect x="4" y="26" width="152" height="4" fill="#b8a878"/>
        <!-- clouds -->
        <g class="cloud-anim">
          <rect x="20" y="12" width="16" height="4" fill="white" opacity=".6"/>
          <rect x="16" y="16" width="24" height="4" fill="white" opacity=".6"/>
        </g>
        <g class="cloud-anim" style="animation-delay:-8s;">
          <rect x="100" y="20" width="20" height="4" fill="white" opacity=".5"/>
          <rect x="96" y="24" width="28" height="4" fill="white" opacity=".5"/>
        </g>
        <!-- sun -->
        <rect x="130" y="8" width="8" height="8" fill="#f8e060"/>
        <rect x="126" y="12" width="4" height="4" fill="#f8e060" opacity=".5"/>
        <rect x="138" y="12" width="4" height="4" fill="#f8e060" opacity=".5"/>
      </g>

      <!-- ====== CLOCK ON WALL (left of window) ====== -->
      <g id="wall-clock">
        <rect x="310" y="14" width="40" height="40" fill="#f8f0e0" stroke="#b8a878" stroke-width="3"/>
        <rect x="314" y="18" width="32" height="32" fill="#fffef8"/>
        <text id="clock-text" x="330" y="40" text-anchor="middle" font-size="10" fill="#4a4040" class="pixel-font">00:00</text>
        <text x="330" y="46" text-anchor="middle" font-size="5" fill="#8a7a6a" class="pixel-font" id="clock-colon-dot" class="clock-colon">●</text>
      </g>

      <!-- ====== BULLETIN BOARD on wall (Pokemon-style, right of window) ====== -->
      <g id="whiteboard" transform="translate(620,10)">
        <rect x="0" y="0" width="120" height="52" fill="#b07848"/>
        <rect x="4" y="4" width="112" height="44" fill="#d8c098"/>
        <!-- pinned memos -->
        <rect x="10" y="10" width="30" height="20" fill="#f8f080"/>
        <rect x="22" y="8" width="4" height="4" fill="#f03030" rx="2"/>
        <rect x="50" y="8" width="25" height="18" fill="#a0d8f0"/>
        <rect x="60" y="6" width="4" height="4" fill="#3070d0" rx="2"/>
        <rect x="80" y="14" width="28" height="24" fill="#f8c0c0"/>
        <rect x="92" y="12" width="4" height="4" fill="#48b848" rx="2"/>
        <!-- memo text lines -->
        <rect x="12" y="14" width="20" height="2" fill="#a09060" opacity=".5"/>
        <rect x="12" y="18" width="16" height="2" fill="#a09060" opacity=".5"/>
        <rect x="52" y="12" width="18" height="2" fill="#6090b0" opacity=".5"/>
        <rect x="82" y="20" width="22" height="2" fill="#c08080" opacity=".5"/>
      </g>

      <!-- ====== FLOOR (Pokemon-style tile, y=80 to y=540) ====== -->
      <g id="floor">
        <rect x="0" y="80" width="960" height="460" fill="#f0f0f0"/>
        <!-- Pokemon-style checker tile (48x48 grid, alternating white/gray) -->
        <g opacity=".3">
          <!-- Row 0: y=80 -->
          <rect x="0" y="80" width="48" height="48" fill="#d8d8e0"/>
          <rect x="96" y="80" width="48" height="48" fill="#d8d8e0"/>
          <rect x="192" y="80" width="48" height="48" fill="#d8d8e0"/>

          <rect x="480" y="80" width="48" height="48" fill="#d8d8e0"/>

          <rect x="672" y="80" width="48" height="48" fill="#d8d8e0"/>
          <rect x="768" y="80" width="48" height="48" fill="#d8d8e0"/>
          <rect x="864" y="80" width="48" height="48" fill="#d8d8e0"/>
          <!-- Row 1: y=128 -->
          <rect x="48" y="128" width="48" height="48" fill="#d8d8e0"/>
          <rect x="144" y="128" width="48" height="48" fill="#d8d8e0"/>
          <rect x="240" y="128" width="48" height="48" fill="#d8d8e0"/>
          <rect x="336" y="128" width="48" height="48" fill="#d8d8e0"/>
          <rect x="432" y="128" width="48" height="48" fill="#d8d8e0"/>
          <rect x="528" y="128" width="48" height="48" fill="#d8d8e0"/>
          <rect x="624" y="128" width="48" height="48" fill="#d8d8e0"/>
          <rect x="720" y="128" width="48" height="48" fill="#d8d8e0"/>
          <rect x="816" y="128" width="48" height="48" fill="#d8d8e0"/>
          <rect x="912" y="128" width="48" height="48" fill="#d8d8e0"/>
          <!-- Row 2: y=176 -->
          <rect x="0" y="176" width="48" height="48" fill="#d8d8e0"/>
          <rect x="96" y="176" width="48" height="48" fill="#d8d8e0"/>
          <rect x="192" y="176" width="48" height="48" fill="#d8d8e0"/>
          <rect x="288" y="176" width="48" height="48" fill="#d8d8e0"/>
          <rect x="384" y="176" width="48" height="48" fill="#d8d8e0"/>
          <rect x="480" y="176" width="48" height="48" fill="#d8d8e0"/>
          <rect x="576" y="176" width="48" height="48" fill="#d8d8e0"/>
          <rect x="672" y="176" width="48" height="48" fill="#d8d8e0"/>
          <rect x="768" y="176" width="48" height="48" fill="#d8d8e0"/>
          <rect x="864" y="176" width="48" height="48" fill="#d8d8e0"/>
          <!-- Row 3: y=224 -->
          <rect x="48" y="224" width="48" height="48" fill="#d8d8e0"/>
          <rect x="144" y="224" width="48" height="48" fill="#d8d8e0"/>
          <rect x="240" y="224" width="48" height="48" fill="#d8d8e0"/>
          <rect x="336" y="224" width="48" height="48" fill="#d8d8e0"/>

// ── Pixel Sprite Renderer ──
// Each sprite pixel = 4x4 SVG units. Sprites are 9 wide x 16 tall
const P = 4 // pixel size

function renderSprite(data, x, y, colors) {
  let svg = ''
  for (let ry = 0; ry < data.length; ry++) {
    for (let rx = 0; rx < data[ry].length; rx++) {
      const cell = data[ry][rx]
      if (!cell) continue
      const color = colors[cell] || cell
      svg += `<rect x="${x + rx * P}" y="${y + ry * P}" width="${P}" height="${P}" fill="${color}"/>`
    }
  }
  return svg
}

// ── Render character SVG ──
function svgWorking(ck, uniqueId, memberId) {
  const c = COLORS[ck]
  const colorMap = { h:c.hair, s:c.skin, e:c.eye, t:c.shirt, p:c.pants, o:c.shoes, m:'#e07060', g:'#404060', c:'#f0f0f8', k:c.shirt, n:'#d02020', a:'#483068', b:c.hair }
  const spriteData = (memberId && MEMBER_SPRITES[memberId]) ? MEMBER_SPRITES[memberId].working : SPRITE_WORKING
  const body = renderSprite(spriteData, 0, 0, colorMap)
  // Arms with animation
  const armLColors = { t:c.shirt, s:c.skin, c:'#f0f0f8' }
  const armRColors = { t:c.shirt, s:c.skin, c:'#f0f0f8' }
  const leftArm = renderSprite(ARM_LEFT, -2 * P, 9 * P, armLColors)
  const rightArm = renderSprite(ARM_RIGHT, 9 * P, 9 * P, armRColors)

  return `<g>
    ${body}
    <g class="typing-arm-l">${leftArm}</g>
    <g class="typing-arm-r">${rightArm}</g>
  </g>`
}

// Generate 2 walk frames from an idle sprite by shifting the bottom 3 rows
function makeWalkFrames(sprite) {
  const h = sprite.length, w = sprite[0].length
  const f1 = sprite.map(r => [...r])
  const f2 = sprite.map(r => [...r])
  for (let r = h - 3; r < h; r++) {
    f1[r] = new Array(w).fill(null)
    f2[r] = new Array(w).fill(null)
    for (let c = 0; c < w - 1; c++) f1[r][c] = sprite[r][c + 1]  // shift left
    for (let c = 1; c < w; c++)     f2[r][c] = sprite[r][c - 1]  // shift right
  }
  return [f1, f2]
}

function svgWalking(ck, memberId) {
  const c = COLORS[ck]
  const colorMap = { h:c.hair, s:c.skin, e:c.eye, t:c.shirt, p:c.pants, o:c.shoes, m:'#e07060', g:'#404060', c:'#f0f0f8', k:c.shirt, n:'#d02020', a:'#483068', b:c.hair }
  const spriteData = (memberId && MEMBER_SPRITES[memberId]) ? MEMBER_SPRITES[memberId].idle : SPRITE_IDLE
  const [walk1, walk2] = makeWalkFrames(spriteData)
  const frame1 = renderSprite(walk1, 0, 0, colorMap)
  const frame2 = renderSprite(walk2, 0, 0, colorMap)
  return `<g class="walk-frame-a">${frame1}</g><g class="walk-frame-b">${frame2}</g>`
}

  const colorMap = { h:c.hair, s:c.skin, e:c.eye, t:c.shirt, p:c.pants, o:c.shoes, m:'#e07060', g:'#404060', c:'#f0f0f8', k:c.shirt, n:'#d02020', a:'#483068', b:c.hair }
  const spriteData = (memberId && MEMBER_SPRITES[memberId]) ? MEMBER_SPRITES[memberId].idle : SPRITE_IDLE
  const body = renderSprite(spriteData, 0, 0, colorMap)
  return `<g class="idle-anim">${body}</g>`
}

function svgSleeping(ck) {
  const c = COLORS[ck]
  const colorMap = { h:c.hair, s:c.skin, e:c.eye, t:c.shirt, p:c.pants, o:c.shoes, '_':'#4a4a5a' }
  const body = renderSprite(SPRITE_SLEEPING, 0, 0, colorMap)
  // zzZ pixel text
  const zzz = `
    <g class="zzz-anim">

      <rect x="${16*P}" y="${-1*P}" width="${P}" height="${P}" fill="#a0a0c0" opacity=".7"/>

// ── Status bubble (small, for task/status) ──
function svgBubble(text, color, x, y) {
  const charW = 7
  const w = text.length * charW + 12
  return `
    <g transform="translate(${x},${y})">
      <rect x="${-w/2}" y="-12" width="${w}" height="14" fill="#181830" stroke="${color}" stroke-width="2"/>
      <rect x="${-w/2+1}" y="-11" width="${w-2}" height="12" fill="#181830"/>
      <text x="0" y="-2" text-anchor="middle" font-size="6" fill="${color}" class="pixel-font">${text}</text>
      <rect x="-2" y="2" width="4" height="4" fill="#181830" stroke="${color}" stroke-width="1" transform="rotate(45,-0,4)"/>
      <rect x="-3" y="1" width="6" height="3" fill="#181830"/>
    </g>`
}

// ── Name label (large, below character) with role ──
function svgNameLabel(name, color, x, y, role, status) {
  const charW = 17
  const dotW = 14
  const nameW = name.length * charW + dotW + 16
  const roleW = role ? role.length * 9 + 12 : 0
  const w = Math.max(nameW, roleW)
  const h = role ? 44 : 22
  const dotColor = status === 'active' ? '#48c048' : '#687080'
  const dotGlow = status === 'active' ? `<rect x="${-w/2 + 3}" y="4" width="8" height="8" fill="${dotColor}" opacity=".3"/>` : ''
  return `
    <g transform="translate(${x},${y})">
      <rect x="${-w/2}" y="-2" width="${w}" height="${h}" fill="rgba(30,30,50,.88)" rx="0"/>
      ${dotGlow}
      <rect x="${-w/2 + 5}" y="5" width="6" height="6" fill="${dotColor}"/>
      <text x="${dotW/2}" y="14" text-anchor="middle" font-size="16" fill="${color}" class="pixel-font" stroke="#181828" stroke-width="3" paint-order="stroke">${name}</text>
      ${role ? `<text x="0" y="34" text-anchor="middle" font-size="12" fill="#b0b0c0" class="pixel-font">${role}</text>` : ''}
    </g>`
}

// ── Task label ──
function taskLabel(agent) {
  const t = (agent.last_tool || '').toLowerCase()
  if (t.includes('edit') || t.includes('write')) return 'コーディング'
  if (t.includes('read') || t.includes('grep') || t.includes('glob')) return 'リサーチ'
  if (t.includes('bash')) return 'ビルド中'
  if (agent.status === 'active') return 'タスク実行中'
  if (agent.status === 'idle') return 'スタンバイ'
  return 'スリープ'
}

function accentForType(ck) {
  return COLORS[ck]?.hair || '#a78bfa'
}

// ── Time helpers ──
function timeAgo(iso) {
  const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000)
  if (s < 60) return s + '秒前'
  if (s < 3600) return Math.floor(s / 60) + '分前'
  return Math.floor(s / 3600) + '時間前'
}
function elapsed(iso) {
  const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000)
  const m = Math.floor(s / 60), h = Math.floor(m / 60)
  if (h > 0) return h + 'h ' + m % 60 + 'm'
  if (m > 0) return m + 'm ' + s % 60 + 's'
  return s + 's'
}

// ── Character Popup ──
let lastAgentData = []

function showCharPopup(memberId) {
  const agent = lastAgentData.find(a => a.member_id === memberId)
  if (!agent) return

  // Remove existing popup if any
  const existing = document.querySelector('.char-popup-overlay')
  if (existing) existing.remove()

  const isActive = agent.status === 'active'
  const statusText = isActive ? '稼働中' : '待機中'
  const statusColor = isActive ? 'var(--active-green)' : 'var(--idle-yellow)'

  // Determine task info to display
  let taskSection = ''
  if (isActive) {
    // Currently active: show current task
    const toolCount = agent.tool_count || 0
    const elapsedTime = agent.started_at ? elapsed(agent.started_at) : '-'
    taskSection = `
      <div class="char-popup-task">
        ◆ 現在のタスク<br>
        コマンド: ${agent.command || '-'}<br>
        タスク: ${agent.task || '-'}<br>
        ツール使用: ${toolCount}回<br>
        経過時間: ${elapsedTime}
      </div>`
  } else if (agent.last_task) {
    // Has previous task
    const lt = agent.last_task
    const toolCount = lt.tool_count || 0
    const startedAt = lt.started_at ? new Date(lt.started_at) : null
    const endedAt = lt.ended_at ? new Date(lt.ended_at) : null
    let duration = '-'
    if (startedAt && endedAt) {
      const diffSec = Math.floor((endedAt - startedAt) / 1000)
      const m = Math.floor(diffSec / 60), s = diffSec % 60
      duration = m > 0 ? `${m}m ${s}s` : `${s}s`
    }
    const endedAgo = lt.ended_at ? timeAgo(lt.ended_at) : '-'
    taskSection = `
      <div class="char-popup-task">
        ◆ 前回のタスク<br>
        コマンド: ${lt.command || '-'}<br>
        タスク: ${lt.task || '-'}<br>
        ツール使用: ${toolCount}回<br>
        実行時間: ${duration}<br>
        終了: ${endedAgo}
      </div>`
  } else {
    taskSection = `<div class="char-popup-task">◆ タスク履歴なし</div>`
  }

  // Tool history
  const historyData = isActive ? (agent.history || []) : (agent.last_task?.history || [])
  let historySection = ''
  if (historyData.length > 0) {
    const items = historyData.map(h => {
      const t = h.time ? new Date(h.time) : null
      const timeStr = t ? `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}` : ''
      return `<div class="hist-item"><span>${h.tool} — ${h.desc}</span><span>${timeStr}</span></div>`
    }).join('')
    historySection = `
      <div class="char-popup-history">
        ◆ ツール履歴<br>
        ${items}
      </div>`
  }

  const separator = `<div style="color:var(--panel-border);font-size:7px;margin:4px 0;">─────────────</div>`

  const overlay = document.createElement('div')
  overlay.className = 'char-popup-overlay'
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove() }
  overlay.innerHTML = `
    <div class="char-popup" onclick="event.stopPropagation()">
      <div class="char-popup-title">▶ ${agent.name} — ${agent.role}</div>
      ${separator}
      <div class="char-popup-status" style="color:${statusColor};">現在のステータス: ${statusText}</div>
      ${taskSection}
      ${historySection}
      ${separator}
      <div class="char-popup-close">▶ タップで閉じる</div>
    </div>`
  document.body.appendChild(overlay)
}

// ── Render agents into SVG + info panel ──
let lastStatusKey = ''

function renderRoom(agents) {
  // Use API data if available, else defaults
  const data = (agents.length > 0 && agents[0].member_id) ? agents : MEMBERS_DEFAULT
  lastAgentData = data
  const active = data.filter(a => a.status === 'active')
  const nonActive = data.filter(a => a.status !== 'active')

  // Only re-render the SVG room when agent statuses actually change
  // This prevents periodic polling from killing idle behaviors
  const statusKey = data.map(a => a.member_id + ':' + a.status).sort().join(',')
  const statusChanged = statusKey !== lastStatusKey
  lastStatusKey = statusKey

  const allSlotIds = ['desk-slot-0','desk-slot-1','desk-slot-2','sofa-slot-0','sofa-slot-1','stand-slot-0','stand-slot-1','stand-slot-2','stand-slot-3','stand-slot-4','stand-slot-5','stand-slot-6','stand-slot-7','stand-slot-8']

  if (statusChanged) {
    // Cancel any in-progress idle wandering
    clearWalking()

    // Clear all slots
    allSlotIds.forEach(id => { const el = document.getElementById(id); if (el) el.innerHTML = '' })
    for (let i = 0; i < 3; i++) {
      const screen = document.getElementById('screen-' + i)
      if (screen) screen.setAttribute('fill', '#1a2a1a')
    }

    // Desk slots (active agents, up to 3)
    for (let i = 0; i < 3 && i < active.length; i++) {
      const slot = document.getElementById('desk-slot-' + i)
      const screen = document.getElementById('screen-' + i)
      const a = active[i], ck = charColor(a.member_id)
      const label = a.command || taskLabel(a)
      const charSvg = svgWorking(ck, i, a.member_id)
      const glowSvg = `<circle cx="18" cy="0" r="30" fill="${accentForType(ck)}" opacity=".3" style="animation:active-glow 2s ease-in-out infinite;"/>`
      const nameLabel = svgNameLabel(a.name, accentForType(ck), 18, 24, a.role, a.status)
      const taskBubble = svgBubble(label, '#f8c818', 18, -8)

      // Walk-to-desk animation (from previous idle slot)
      const deskId = 'desk-slot-' + i
      const prev = prevSlotMap[a.member_id]
      let wOpen = '', wClose = ''
      if (prev && prev !== deskId && SLOT_POSITIONS[prev]) {
        const dx = SLOT_POSITIONS[prev].x - SLOT_POSITIONS[deskId].x
        const dy = SLOT_POSITIONS[prev].y - SLOT_POSITIONS[deskId].y
        wOpen = `<g><animateTransform attributeName="transform" type="translate" from="${dx} ${dy}" to="0 0" dur="0.8s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/><g><animateTransform attributeName="transform" type="translate" values="0 0;0 -6;0 0;0 -6;0 0;0 -3;0 0" dur="0.8s" fill="freeze"/>`
        wClose = `</g></g>`
      }

      // カタカタ typing effect
      const kataText = `<text x="18" y="-54" text-anchor="middle" font-size="5" fill="#f8c818" class="pixel-font kata-text">カタカタ</text><text x="30" y="-62" text-anchor="middle" font-size="4" fill="#a0d8f0" class="pixel-font kata-text kata-text-delay">カタカタ</text>`

      slot.innerHTML = `${wOpen}${glowSvg}<g class="kata-body" transform="translate(-18,-44)">${charSvg}</g>${nameLabel}${taskBubble}${kataText}${wClose}`
      slot.setAttribute('data-member-id', a.member_id)
      slot.style.cursor = 'pointer'
      slot.onclick = ((mid) => () => showCharPopup(mid))(a.member_id)
      if (screen) screen.setAttribute('fill', '#0a1a0a')
    }

    // Non-active: idle on sofa/stand
    let idleIdx = 0

    // Sofa (up to 2 sleeping-style)
    for (let i = 0; i < 2 && idleIdx < nonActive.length; i++, idleIdx++) {
      const slot = document.getElementById('sofa-slot-' + i)
      const a = nonActive[idleIdx], ck = charColor(a.member_id)
      const charSvg = svgSleeping(ck)
      const nameLabel = svgNameLabel(a.name, '#8a8a9a', 32, 50, a.role, a.status)
      slot.innerHTML = `<g transform="translate(-8, 4)">${charSvg}</g>${nameLabel}`
      slot.setAttribute('data-member-id', a.member_id)
      slot.style.cursor = 'pointer'
      slot.onclick = ((mid) => () => showCharPopup(mid))(a.member_id)
    }

    // Standing (up to 9)
    for (let i = 0; i < 9 && idleIdx < nonActive.length; i++, idleIdx++) {
      const slot = document.getElementById('stand-slot-' + i)
      const a = nonActive[idleIdx], ck = charColor(a.member_id)
      const charSvg = svgIdle(ck, a.member_id)
      const nameLabel = svgNameLabel(a.name, accentForType(ck), 18, 24, a.role, a.status)
      slot.innerHTML = `<g transform="translate(-18,-44)">${charSvg}</g>${nameLabel}`
      slot.setAttribute('data-member-id', a.member_id)
      slot.style.cursor = 'pointer'
      slot.onclick = ((mid) => () => showCharPopup(mid))(a.member_id)
    }

    // Update slot map for next render's walk animations
    prevSlotMap = {}
    allSlotIds.forEach(id => {
      const el = document.getElementById(id)
      if (el) {
        const mid = el.getAttribute('data-member-id')
        if (mid) prevSlotMap[mid] = id
      }
    })
  }

  // Info panel — always update (even when SVG room is unchanged)
  const panel = document.getElementById('agent-panel')

  // Active section
  const activeCards = active.map(a => {
    const ck = charColor(a.member_id)
    const col = accentForType(ck)
    const desc = a.last_desc || a.task || a.command || '処理中...'
    const toolInfo = a.tool_count > 0 ? ` | ツール: ${a.tool_count}回` : ''
    const timeInfo = a.started_at ? ` | ${elapsed(a.started_at)}` : ''
    return `<div class="agent-card is-active" onclick="showCharPopup('${a.member_id}')" style="cursor:pointer;">
      <div class="status-dot active"></div>
      <div class="agent-info">
        <div class="agent-name" style="color:${col};">${a.name} <span style="color:var(--text-dim);">${a.role}</span></div>
        <div class="agent-status">[稼働中]${toolInfo}${timeInfo}</div>
        <div class="agent-task">${desc}</div>
      </div>
    </div>`
  }).join('')

  // Idle section
  const idleCards = nonActive.map(a => {
    const ck = charColor(a.member_id)
    const col = accentForType(ck)
    const cmdText = a.commands ? a.commands.join(' ') : ''
    const lastTaskHint = a.last_task ? `前回: ${a.last_task.command || ''} ${a.last_task.task || ''}`.trim().slice(0, 40) : `${cmdText} 待機`
    return `<div class="agent-card is-idle" onclick="showCharPopup('${a.member_id}')" style="cursor:pointer;">
      <div class="status-dot idle"></div>
      <div class="agent-info">
        <div class="agent-name" style="color:${col};">${a.name} <span style="color:var(--text-dim);">${a.role}</span></div>
        <div class="agent-task">${lastTaskHint}</div>
      </div>
    </div>`
  }).join('')

  const activeSection = active.length > 0
    ? `<div class="section-header active-section">▶ 稼働中 <span class="count">(${active.length})</span></div>
       <div class="agent-grid">${activeCards}</div>`
    : `<div class="section-header">▶ 全員待機中</div>`

  const idleSection = nonActive.length > 0
    ? `<div class="section-divider"></div>
       <div class="section-header">▷ 待機中 <span class="count">(${nonActive.length})</span></div>
       <div class="agent-grid">${idleCards}</div>`
    : ''

  panel.innerHTML = activeSection + idleSection

  // Update status bar
  const activeCount = active.length
  document.getElementById('sb-active-count').textContent = activeCount + '/' + data.length

  // Update active names in status bar
  const activeNames = active.map(a => a.name).join(' ')
  document.getElementById('sb-active-names').textContent = activeNames ? `[ ${activeNames} ]` : ''

  const hpPct = Math.min(100, 20 + activeCount * 25 + Math.floor(Math.random() * 5))
  const mpPct = Math.min(100, 30 + data.length * 10 + Math.floor(Math.random() * 5))
  const hpEl = document.getElementById('sb-hp')
  const mpEl = document.getElementById('sb-mp')
  hpEl.style.width = hpPct + '%'
  hpEl.style.background = hpPct > 60 ? 'var(--active-green)' : hpPct > 30 ? 'var(--idle-yellow)' : '#ef4444'
  mpEl.style.width = mpPct + '%'
}

      <rect x="${x-22}" y="${y-14}" width="44" height="16" fill="rgba(24,24,48,.92)" stroke="#a8a8c8" stroke-width="1" rx="2"/>
      <text x="${x}" y="${y-3}" text-anchor="middle" font-size="5" fill="#d0d0e8" class="pixel-font">${text}</text>
      <rect x="${x-1}" y="${y+2}" width="3" height="3" fill="rgba(24,24,48,.92)" stroke="#a8a8c8" stroke-width="1" transform="rotate(45,${x},${y+3})"/>
      <circle cx="${x+4}" cy="${y+7}" r="1.5" fill="#a8a8c8" opacity=".5"/>
    </g>`
}

// Create walking SVG element, returns { dur (seconds) }
// Speed: ~100px/s — RPG-style steady walking pace
function createWalkElement(agent, from, to) {
  const ck = charColor(agent.member_id)
  const dist = Math.sqrt((to.x - from.x)**2 + (to.y - from.y)**2)
  const dur = Math.max(1.2, dist / 100)

  const walkLayer = document.getElementById('walk-layer')
  if (!walkLayer) return { dur: 0 }

  const walkId = 'walk-' + agent.member_id
  const existing = document.getElementById(walkId)
  if (existing) existing.remove()

  const walkSvg = svgWalking(ck, agent.member_id)
  const nameLabel = svgNameLabel(agent.name, accentForType(ck), 18, 24, agent.role, 'idle')

  // Flip character to face movement direction
  const facingLeft = to.x < from.x
  const flipTransform = facingLeft ? `translate(18,0) scale(-1,1) translate(-18,0)` : ''

  const walkEl = document.createElementNS('http://www.w3.org/2000/svg', 'g')
  walkEl.id = walkId
  walkEl.innerHTML = `
    <animateTransform attributeName="transform" type="translate"
      from="${from.x} ${from.y}" to="${to.x} ${to.y}"
      dur="${dur}s" fill="freeze" calcMode="linear"/>
    <g class="walk-bounce">
      <g transform="translate(-18,-44)"><g transform="${flipTransform}">${walkSvg}</g></g>
    </g>
    ${nameLabel}`
  walkLayer.appendChild(walkEl)

  return { dur }
}

// Place agent at an activity point (standing with optional thought bubble)
function placeAtActivity(agent, pos, thoughtText, durSec) {
  const walkLayer = document.getElementById('walk-layer')
  if (!walkLayer) return

  const actId = 'act-' + agent.member_id
  const existing = document.getElementById(actId)
  if (existing) existing.remove()

  const ck = charColor(agent.member_id)
  const idleSvg = svgIdle(ck, agent.member_id)
  const nameLabel = svgNameLabel(agent.name, accentForType(ck), 18, 24, agent.role, 'idle')
  const thought = thoughtText ? svgThought(thoughtText, 18, -54, durSec) : ''

  const actEl = document.createElementNS('http://www.w3.org/2000/svg', 'g')
  actEl.id = actId
  actEl.setAttribute('transform', `translate(${pos.x},${pos.y})`)
  actEl.innerHTML = `
    <g class="look-anim">
      <g transform="translate(-18,-44)">${idleSvg}</g>
    </g>
    ${nameLabel}${thought}`
  walkLayer.appendChild(actEl)
}

function removeActivity(memberId) {
  const el = document.getElementById('act-' + memberId)
  if (el) el.remove()
}

// Place agent at a destination slot
function placeAtSlot(agent, slotId) {
  const slot = document.getElementById(slotId)
  if (!slot) return

  const ck = charColor(agent.member_id)
  if (slotId.startsWith('sofa-')) {
    const sleepSvg = svgSleeping(ck)
    const nl = svgNameLabel(agent.name, '#8a8a9a', 32, 50, agent.role, agent.status)
    slot.innerHTML = `<g transform="translate(-8, 4)">${sleepSvg}</g>${nl}`
  } else {
    const idleSvg2 = svgIdle(ck, agent.member_id)
    const nl = svgNameLabel(agent.name, accentForType(ck), 18, 24, agent.role, agent.status)
    slot.innerHTML = `<g transform="translate(-18,-44)">${idleSvg2}</g>${nl}`
  }
  slot.setAttribute('data-member-id', agent.member_id)
  slot.style.cursor = 'pointer'
  slot.onclick = () => showCharPopup(agent.member_id)
  prevSlotMap[agent.member_id] = slotId
}

// Remove agent from their current slot
function removeFromSlot(memberId, slotId) {
  const srcSlot = document.getElementById(slotId)
  if (srcSlot) {
    srcSlot.innerHTML = ''
    srcSlot.removeAttribute('data-member-id')
  }
  delete prevSlotMap[memberId]
}

// Find an available idle slot
function findAvailableSlot(occupied, preferSofa) {
  const sofaSlots = ['sofa-slot-0', 'sofa-slot-1']
  const standSlots = ['stand-slot-0','stand-slot-1','stand-slot-2','stand-slot-3','stand-slot-4','stand-slot-5','stand-slot-6','stand-slot-7','stand-slot-8']
  if (preferSofa) {
    const avail = sofaSlots.filter(s => !occupied.has(s))
    if (avail.length > 0) return avail[Math.floor(Math.random() * avail.length)]
  }
  const all = [...sofaSlots, ...standSlots].filter(s => !occupied.has(s))
  return all.length > 0 ? all[Math.floor(Math.random() * all.length)] : null
}

// ── Behavior: Simple Wander (move to another random slot) ──
function doWander(agent, currentSlotId, occupied) {
  const idleSlots = ['sofa-slot-0','sofa-slot-1','stand-slot-0','stand-slot-1','stand-slot-2','stand-slot-3','stand-slot-4','stand-slot-5','stand-slot-6','stand-slot-7','stand-slot-8']
  const available = idleSlots.filter(s => s !== currentSlotId && !occupied.has(s))
  if (available.length === 0) return

  const destSlotId = available[Math.floor(Math.random() * available.length)]
  const from = SLOT_POSITIONS[currentSlotId]
  const to = SLOT_POSITIONS[destSlotId]

  removeFromSlot(agent.member_id, currentSlotId)
  const { dur } = createWalkElement(agent, from, to)
  if (dur === 0) return

  walkingAgents[agent.member_id] = setTimeout(() => {
    const el = document.getElementById('walk-' + agent.member_id)
    if (el) el.remove()
    delete walkingAgents[agent.member_id]
    placeAtSlot(agent, destSlotId)
  }, dur * 1000 + 100)
}

// ── Behavior: Stroll (walk through multiple waypoints) ──
function doStroll(agent, currentSlotId, occupied) {
  const route = STROLL_ROUTES[Math.floor(Math.random() * STROLL_ROUTES.length)]
  const from = SLOT_POSITIONS[currentSlotId]

  const standSlots = ['stand-slot-0','stand-slot-1','stand-slot-2','stand-slot-3','stand-slot-4','stand-slot-5','stand-slot-6','stand-slot-7','stand-slot-8']
  const available = standSlots.filter(s => s !== currentSlotId && !occupied.has(s))
  if (available.length === 0) { doWander(agent, currentSlotId, occupied); return }

  const destSlotId = available[Math.floor(Math.random() * available.length)]
  const destPos = SLOT_POSITIONS[destSlotId]

  // Build path: current pos -> waypoints -> destination
  const points = [from, ...route.map(k => ACTIVITY_POINTS[k]), destPos]

  removeFromSlot(agent.member_id, currentSlotId)

  let totalDelay = 0
  const timeouts = []

  for (let i = 0; i < points.length - 1; i++) {
    const segFrom = points[i]
    const segTo = points[i + 1]
    const dist = Math.sqrt((segTo.x - segFrom.x)**2 + (segTo.y - segFrom.y)**2)
    const dur = Math.max(1.0, dist / 100)

    const delay = totalDelay
    timeouts.push(setTimeout(() => {
      createWalkElement(agent, segFrom, segTo)
    }, delay))

    totalDelay += dur * 1000 + 50
  }

  // Place at destination after full stroll
  timeouts.push(setTimeout(() => {
    const walkEl = document.getElementById('walk-' + agent.member_id)
    if (walkEl) walkEl.remove()
    delete walkingAgents[agent.member_id]
    placeAtSlot(agent, destSlotId)
  }, totalDelay + 100))

  walkingAgents[agent.member_id] = timeouts
}

// ── Behavior: Activity Visit (vending machine, bookshelf, etc.) ──
function doActivityVisit(agent, currentSlotId, occupied, activityKey) {
  const from = SLOT_POSITIONS[currentSlotId]
  const actPos = ACTIVITY_POINTS[activityKey]
  if (!actPos) { doWander(agent, currentSlotId, occupied); return }

  const texts = THOUGHT_TEXTS[activityKey] || ['...']
  const thoughtText = texts[Math.floor(Math.random() * texts.length)]
  const pauseDur = 3000 + Math.random() * 4000  // 3-7 seconds at activity

  removeFromSlot(agent.member_id, currentSlotId)

  // Step 1: Walk to activity point
  const { dur: dur1 } = createWalkElement(agent, from, actPos)
  if (dur1 === 0) return

  const timeouts = []

  // Step 2: Arrive, stand with thought bubble
  timeouts.push(setTimeout(() => {
    const walkEl = document.getElementById('walk-' + agent.member_id)
    if (walkEl) walkEl.remove()
    placeAtActivity(agent, actPos, thoughtText, pauseDur / 1000)
  }, dur1 * 1000 + 100))

  // Step 3: After pause, walk to a random available slot
  timeouts.push(setTimeout(() => {
    removeActivity(agent.member_id)

    const currentOccupied = new Set(Object.values(prevSlotMap))
    const destSlotId = findAvailableSlot(currentOccupied, false)
    if (!destSlotId) {
      delete walkingAgents[agent.member_id]
      return
    }
    const destPos = SLOT_POSITIONS[destSlotId]
    const { dur: dur2 } = createWalkElement(agent, actPos, destPos)

    timeouts.push(setTimeout(() => {
      const walkEl = document.getElementById('walk-' + agent.member_id)
      if (walkEl) walkEl.remove()
      delete walkingAgents[agent.member_id]
      placeAtSlot(agent, destSlotId)
    }, dur2 * 1000 + 100))
  }, dur1 * 1000 + 100 + pauseDur))

  walkingAgents[agent.member_id] = timeouts
}

// ── Behavior: Sofa Nap (walk to sofa and sleep) ──
function doSofaNap(agent, currentSlotId, occupied) {
  if (currentSlotId.startsWith('sofa-')) { doWander(agent, currentSlotId, occupied); return }

  const sofaSlots = ['sofa-slot-0', 'sofa-slot-1']
  const availSofa = sofaSlots.filter(s => !occupied.has(s))
  if (availSofa.length === 0) { doWander(agent, currentSlotId, occupied); return }

  const destSlotId = availSofa[Math.floor(Math.random() * availSofa.length)]
  const from = SLOT_POSITIONS[currentSlotId]
  const to = SLOT_POSITIONS[destSlotId]

  removeFromSlot(agent.member_id, currentSlotId)
  const { dur } = createWalkElement(agent, from, to)
  if (dur === 0) return

  walkingAgents[agent.member_id] = setTimeout(() => {
    const walkEl = document.getElementById('walk-' + agent.member_id)
    if (walkEl) walkEl.remove()
    delete walkingAgents[agent.member_id]
    placeAtSlot(agent, destSlotId)
  }, dur * 1000 + 100)
}

// ── Main behavior dispatcher ──
function pickBehavior() {
  const behaviors = [
    { type: 'wander',    weight: 3 },
    { type: 'stroll',    weight: 2 },
    { type: 'sofa-nap',  weight: 2 },
    { type: 'vending',   weight: 1.5 },
    { type: 'bookshelf', weight: 1.5 },
  ]
  const total = behaviors.reduce((s, b) => s + b.weight, 0)
  let r = Math.random() * total
  for (const b of behaviors) {
    r -= b.weight
    if (r <= 0) return b.type
  }
  return 'wander'
}

function dispatchBehavior(agent, currentSlotId, occupied) {
  const picked = pickBehavior()
  switch (picked) {
    case 'stroll':    doStroll(agent, currentSlotId, occupied); break
    case 'sofa-nap':  doSofaNap(agent, currentSlotId, occupied); break
    case 'vending':   doActivityVisit(agent, currentSlotId, occupied, 'vending'); break
    case 'bookshelf': doActivityVisit(agent, currentSlotId, occupied, 'bookshelf'); break
    default:          doWander(agent, currentSlotId, occupied); break
  }
}

function performIdleBehavior() {
  const data = lastAgentData
  if (!data || data.length === 0) return

  const idle = data.filter(a => a.status !== 'active' && !walkingAgents[a.member_id])
  const eligible = idle.filter(a => {
    const slotId = prevSlotMap[a.member_id]
    return slotId && SLOT_POSITIONS[slotId] && !slotId.startsWith('desk-')
  })
  if (eligible.length < 1) return

  // Pick 2-3 agents at once (or fewer if not enough available)
  const count = Math.min(eligible.length, 2 + Math.floor(Math.random() * 2))
  const shuffled = eligible.sort(() => Math.random() - 0.5)
  const occupied = new Set(Object.values(prevSlotMap))

  for (let i = 0; i < count; i++) {
    const agent = shuffled[i]
    const currentSlotId = prevSlotMap[agent.member_id]
    if (!currentSlotId) continue
    dispatchBehavior(agent, currentSlotId, occupied)
  }
}

function scheduleNextWander() {
  const delay = 3000 + Math.floor(Math.random() * 5000)
  setTimeout(() => {
    try { performIdleBehavior() } catch(e) { console.warn('idle behavior error:', e) }
    scheduleNextWander()
  }, delay)
}

// ── Polling ──
let lastFetch = null

async function fetchAgents() {
  if (VPS_URL.includes('YOUR_VPS_IP')) return

  const spinner = document.getElementById('spinner')
  spinner.classList.add('show')

  try {
    const res = await fetch(`${VPS_URL}/api/agents`)
    const data = await res.json()
    renderRoom(data)
    lastFetch = new Date()
    updateInfo()
  } catch (e) {
    document.getElementById('update-info').textContent = '接続エラー'
    renderRoom([])
  } finally {
    spinner.classList.remove('show')
  }
}

function updateInfo() {
  if (!lastFetch) return
  const sec = Math.floor((Date.now() - lastFetch) / 1000)
  document.getElementById('update-info').textContent = `${sec}秒前 | ${POLL_INTERVAL / 1000}s間隔`
}

// Init
renderRoom([])
fetchAgents()
setInterval(fetchAgents, POLL_INTERVAL)
setInterval(updateInfo, 1000)
scheduleNextWander()
</script>
